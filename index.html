<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Aion-X Dashboard v8.0</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --main-color: #007bb5; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; overflow: hidden; }
        .editor-side { width: 40%; background: #2c2c2c; color: #ecf0f1; padding: 20px; overflow-y: auto; border-right: 4px solid var(--main-color); }
        .preview-side { width: 60%; background: #525659; display: flex; justify-content: center; padding: 40px; overflow-y: auto; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 45px; box-shadow: 0 0 30px rgba(0,0,0,0.5); color: #333; height: auto; position: relative; }
        .smart-label { font-weight: bold; font-size: 11px; color: var(--main-color); display: block; margin-top: 15px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 4px; font-size: 13px; }
        .btn-lang { padding: 10px; border: none; border-radius: 4px; cursor: pointer; background: #444; color: white; font-weight: bold; }
        .btn-lang.active { background: var(--main-color); }
        .ats-tips { background: #1a3a5a; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 4px solid #f1c40f; font-size: 11px; }
    </style>
</head>
<body>
    <div class="editor-side">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
            <div style="width:40px; height:40px; background:var(--main-color); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">A&N</div>
            <h2 style="color:var(--main-color); margin:0; font-size:18px;">AION-X CONTROL PANEL</h2>
        </div>
        
        <div class="lang-grid" style="display: flex; gap: 5px; margin-bottom: 20px;">
            <button class="btn-lang active" onclick="setMode('hu', this)">HU</button>
            <button class="btn-lang" onclick="setMode('en', this)">EN</button>
            <button class="btn-lang" onclick="setMode('de', this)">DE</button>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label class="smart-label">Stílus / Style</label>
                <select id="style-select" onchange="updateStyle()">
                    <option value="style-10">10. Aion-X Speciál</option>
                    <option value="style-1">1. Modern Oszlopos</option>
                    <option value="style-2">2. Klasszikus</option>
                    <option value="style-3">3. Centrált</option>
                    <option value="style-4">4. Minimalista</option>
                    <option value="style-5">5. Technikai</option>
                    <option value="style-6">6. Kreatív</option>
                    <option value="style-7">7. Menedzseri</option>
                    <option value="style-8">8. Akadémiai</option>
                    <option value="style-9">9. Junior</option>
                </select>
            </div>
            <div style="flex:1">
                <label class="smart-label">Szín / Color</label>
                <input type="color" id="theme-color" value="#007bb5" oninput="updateTheme()" style="height:40px; padding:0; border:none;">
            </div>
        </div>

        <label class="smart-label">Fotó</label>
        <input type="file" id="in-photo" accept="image/*" onchange="loadPhoto(event)">

        <label class="smart-label">Név & Elérhetőség</label>
        <input type="text" id="in-name" placeholder="Teljes Név" oninput="updatePreview()">
        <input type="text" id="in-phone" placeholder="Telefon" oninput="updatePreview()">
        <input type="email" id="in-email" placeholder="Email" oninput="updatePreview()">

        <label class="smart-label">Cím / Address</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="in-zip" placeholder="Irsz." oninput="updatePreview()" style="width:30%">
            <input type="text" id="in-city" placeholder="Város" oninput="updatePreview()" style="width:70%">
        </div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="in-street" placeholder="Utca" oninput="updatePreview()" style="width:70%">
            <input type="text" id="in-house" placeholder="Házszám" oninput="updatePreview()" style="width:30%">
        </div>

        <label class="smart-label">Bemutatkozás / Profile</label>
        <textarea id="in-summary" rows="2" oninput="updatePreview()" placeholder="Írj pár sort magadról..."></textarea>

        <label class="smart-label">Jogosítvány / License</label>
        <input type="text" id="in-license" placeholder="Pl: B kategória" oninput="updatePreview()">

        <label class="smart-label">Iskolák / Edu</label>
        <div id="edu-container"></div>
        <button onclick="addEntry('edu')" style="background:#27ae60; color:white; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;">+ ÚJ ISKOLA</button>

        <label class="smart-label">Múlt / Experience</label>
        <div id="work-container"></div>
        <button onclick="addEntry('work')" style="background:#27ae60; color:white; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;">+ ÚJ MUNKAHELY</button>

        <label class="smart-label">Készségek / Skills</label>
        <textarea id="in-skills" rows="2" oninput="updatePreview()"></textarea>

        <div class="ats-tips">
            <b style="color:#f1c40f;">ATS NINDZSA TIPPEK:</b><br>
            • Használj konkrét szoftverneveket (pl. SAP, Minitab).<br>
            • Az eredményeket számokkal írd le (pl. +20% hatékonyság).<br>
            • Ne használj grafikát a fontos szövegek mögött.
        </div>

        <button onclick="window.print()" style="width:100%; padding:20px; background:var(--main-color); color:white; border:none; border-radius:8px; margin-top:20px; font-weight:bold; cursor:pointer;">PDF GENERÁLÁSA</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div style="position:absolute; bottom:15px; right:15px; opacity:0.15; font-weight:bold; font-size:12px;">AION-X MATRIXLB</div>
            <div class="cv-header" style="display:flex; gap:25px; align-items:flex-start;">
                <div id="out-photo-box" style="display:none; width:130px; height:160px; border:1px solid #ddd; overflow:hidden;">
                    <img id="out-photo" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="header-text">
                    <h1 id="out-name" style="margin:0; font-size: 32px; color: var(--main-color);">NAME</h1>
                    <div id="out-contact" style="font-size:13px; margin-top:10px; line-height:1.4;"></div>
                </div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>

    <script src="dictionary.js"></script>
    <script src="engine.js"></script>
</body>
</html>
