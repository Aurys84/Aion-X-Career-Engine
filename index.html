<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Aion-X Dashboard v7.7</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="editor-side">
        <h2 style="color:var(--main-color)">AION-X CONTROL PANEL</h2>
        
        <div class="lang-grid">
            <button class="btn-lang active" onclick="setMode('hu', this)">HU</button>
            <button class="btn-lang" onclick="setMode('en', this)">EN</button>
            <button class="btn-lang" onclick="setMode('de', this)">DE</button>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label class="smart-label">Stílus / Style</label>
                <select id="style-select" onchange="updateStyle()">
                    <option value="style-1">1. Modern Oszlopos</option>
                    <option value="style-2">2. Klasszikus Keretes</option>
                    <option value="style-3">3. Centrált Üzleti</option>
                    <option value="style-4">4. Minimalista</option>
                    <option value="style-5">5. Technikai Sávos</option>
                    <option value="style-6">6. Kreatív Oldalsáv</option>
                    <option value="style-7">7. Menedzseri Bold</option>
                    <option value="style-8">8. Akadémiai Sűrű</option>
                    <option value="style-9">9. Junior Modern</option>
                    <option value="style-10">10. Aion-X Speciál</option>
                </select>
            </div>
            <div style="flex:1">
                <label class="smart-label">Szín / Color</label>
                <select id="theme-color" onchange="updateTheme()">
                    <option value="#007bb5">Aion Kék</option>
                    <option value="#e67e22">Norbi Narancs</option>
                    <option value="#1a1a1a">Mély Fekete</option>
                    <option value="#27ae60">Smaragd Zöld</option>
                    <option value="#c0392b">Vörös</option>
                    <option value="#8e44ad">Lila</option>
                    <option value="#2c3e50">Pala Szürke</option>
                    <option value="#f39c12">Arany</option>
                    <option value="#d35400">Tégla</option>
                    <option value="#16a085">Türkiz</option>
                </select>
            </div>
        </div>

        <label id="lbl-name" class="smart-label">Név / Name</label>
        <input type="text" id="in-name" placeholder="Teljes Név" oninput="updatePreview()">
        
        <label id="lbl-phone" class="smart-label">Tel / Phone</label>
        <input type="text" id="in-phone" placeholder="Telefonszám" oninput="updatePreview()">
        
        <label id="lbl-email" class="smart-label">Email</label>
        <input type="email" id="in-email" placeholder="E-mail" oninput="updatePreview()">

        <label id="lbl-city" class="smart-label">Helyszín / Location</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="in-zip" placeholder="Irsz." oninput="updatePreview()" style="width:30%">
            <input type="text" id="in-city" placeholder="Város" oninput="updatePreview()" style="width:70%">
        </div>
        <input type="text" id="in-street" placeholder="Utca" oninput="updatePreview()">
        <input type="text" id="in-house" placeholder="Házszám" oninput="updatePreview()">

        <label id="lbl-edu-h" class="smart-label">Tanulmányok / Education</label>
        <div id="edu-container"></div>
        <button onclick="addEntry('edu')" class="add-btn">+ ÚJ ISKOLA</button>

        <label id="lbl-work-h" class="smart-label">Tapasztalat / Experience</label>
        <div id="work-container"></div>
        <button onclick="addEntry('work')" class="add-btn">+ ÚJ MUNKAHELY</button>

        <label id="lbl-summary" class="smart-label">Profil / Summary</label>
        <textarea id="in-summary" rows="2" oninput="updatePreview()"></textarea>

        <label id="lbl-skills" class="smart-label">Készségek / Skills</label>
        <textarea id="in-skills" rows="2" oninput="updatePreview()"></textarea>

        <button onclick="window.print()" class="gen-btn">NYOMTATÁS (PDF)</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header">
                <div class="header-text">
                    <h1 id="out-name">NAME</h1>
                    <div id="out-contact"></div>
                </div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>

    <script src="dictionary.js"></script>
    <script src="engine.js"></script>
</body>
</html>
