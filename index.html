<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Aion Mátrix - Profi Önéletrajz v7.0</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; padding: 20px; margin: 0; }
        .container { max-width: 750px; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #007bb5; text-align: center; margin-bottom: 5px; }
        
        /* OKOSÍTOTT FELÜLET DESIGN */
        .smart-label { font-weight: bold; font-size: 13px; color: #007bb5; display: block; margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .smart-label span { color: #888; font-weight: normal; font-size: 11px; }
        
        .ats-info { background: #eef7ff; border-left: 5px solid #007bb5; padding: 15px; margin: 20px 0; border-radius: 4px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        /* DINAMIKUS SZEKCIÓK */
        .dynamic-entry { background: #fcfcfc; padding: 15px; border: 1px dashed #ccc; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .btn-add { background: #2ecc71; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 15px; width: 100%; }
        
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn-lang { padding: 12px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; font-size: 12px; }
        .btn-hu { background: #2ecc71; grid-column: span 2; }
        .btn-en-mix { background: #3498db; } .btn-de-mix { background: #e67e22; }
        .btn-en-only { background: #1e3799; } .btn-de-only { background: #b33939; }
        .btn-lang.active { outline: 3px solid #333; transform: scale(0.95); }
        
        .gen-btn { width: 100%; padding: 20px; background: #007bb5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 25px; box-shadow: 0 4px 10px rgba(0,123,181,0.3); }
        #kep-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid #007bb5; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Aion Mátrix - Career Engine v7.0</h2>

        <div class="ats-info">
            <strong>ATS Tip:</strong> Use industry standards! / Használj iparági standardokat!
        </div>

        <label class="smart-label">Profilkép <span>(Profile Photo / Profilbild)</span></label>
        <input type="file" id="kep-input" accept="image/*" onchange="previewKep()">
        <img id="kep-preview">

        <label class="smart-label">Nyelvi mód <span>(Choose Output Language / Ausgabesprache wählen)</span></label>
        <div class="lang-grid">
            <button class="btn-lang btn-hu active" onclick="setMode('hu', this)">Magyar</button>
            <button class="btn-lang btn-en-mix" onclick="setMode('en-mix', this)">HU + EN Mix</button>
            <button class="btn-lang btn-de-mix" onclick="setMode('de-mix', this)">HU + DE Mix</button>
            <button class="btn-lang btn-en-only" onclick="setMode('en-only', this)">Only English</button>
            <button class="btn-lang btn-de-only" onclick="setMode('de-only', this)">Nur Deutsch</button>
        </div>
        
        <label class="smart-label">Dizájn Szín <span>(Design Color / Designfarbe)</span></label>
        <select id="szinvalaszto">
            <option value="#007bb5">Aion Kék</option>
            <option value="#1a3a5a">Midnight</option>
            <option value="#2ecc71">Emerald</option>
            <option value="#e67e22">Orange</option>
            <option value="#b33939">Ruby Red</option>
        </select>

        <label class="smart-label">Személyes adatok <span>(Personal Data / Persönliche Daten)</span></label>
        <input type="text" id="nev" placeholder="Név / Name / Name">
        <input type="text" id="cim" placeholder="Város, Utca, Házszám / Address / Adresse">
        <input type="text" id="tel" placeholder="Telefonszám / Phone / Telefon">
        <input type="email" id="email" placeholder="E-mail">

        <label class="smart-label">Bemutatkozás <span>(Profile Summary / Über mich)</span></label>
        <textarea id="bemutat" placeholder="Írj pár sort magadról..." rows="3"></textarea>

        <label class="smart-label">Tanulmányok <span>(Education / Bildung)</span></label>
        <div id="edu-list"></div>
        <button class="btn-add" onclick="addEntry('edu')">+ ISKOLA HOZZÁADÁSA / ADD EDU</button>

        <label class="smart-label">Tapasztalat <span>(Experience / Erfahrung)</span></label>
        <div id="work-list"></div>
        <button class="btn-add" onclick="addEntry('work')">+ MUNKAHELY HOZZÁADÁSA / ADD JOB</button>

        <label class="smart-label">Készségek <span>(Skills / Fähigkeiten)</span></label>
        <input type="text" id="kesz" placeholder="Készségek, szoftverek (Skills...)">

        <button class="gen-btn" onclick="generalas()">GENERÁLÁS / GENERATE / GENERIEREN</button>
    </div>

    <script>
        let mode = 'hu';
        let profilKepData = "";

        function previewKep() {
            const file = document.getElementById('kep-input').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                profilKepData = reader.result;
                const preview = document.getElementById('kep-preview');
                preview.src = reader.result; preview.style.display = 'block';
            };
            if (file) reader.readAsDataURL(file);
        }

        function setMode(m, btn) {
            mode = m;
            document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function addEntry(type) {
            const container = document.getElementById(type + '-list');
            const div = document.createElement('div');
            div.className = 'dynamic-entry';
            div.innerHTML = `
                <input type="text" placeholder="Intézmény-Cég / Institution-Company" class="e-main">
                <input type="text" placeholder="Év / Year" class="e-sub" style="width:30%">
                <input type="text" placeholder="Pozíció-Szak / Role-Subject" class="e-desc">
            `;
            container.appendChild(div);
        }

        async function translate(text, lang) {
            if (!text || mode === 'hu') return "";
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=hu|${lang}`);
                const data = await res.json();
                return data.responseData.translatedText || "";
            } catch (e) { return ""; }
        }

        async function generalas() {
            const btn = document.querySelector('.gen-btn');
            btn.innerText = "SZINKRONIZÁLÁS...";
            const lang = mode.split('-')[0];
            const isOnly = mode.includes('only');
            const szin = document.getElementById('szinvalaszto').value;

            const adatok = {
                nev: document.getElementById('nev').value,
                cim: document.getElementById('cim').value,
                tel: document.getElementById('tel').value,
                email: document.getElementById('email').value,
                bemutat: document.getElementById('bemutat').value,
                kesz: document.getElementById('kesz').value
            };

            // Fordítások
            const tr = {
                nev: (mode !== 'hu' && isOnly) ? await translate(adatok.nev, lang) : "",
                cim: (mode !== 'hu') ? await translate(adatok.cim, lang) : "",
                bemutat: (mode !== 'hu') ? await translate(adatok.bemutat, lang) : "",
                kesz: (mode !== 'hu') ? await translate(adatok.kesz, lang) : ""
            };

            const dicts = {
                hu: { c: "ADATOK", s: "KÉSZSÉGEK", p: "PROFIL", e: "TANULMÁNYOK", ex: "TAPASZTALAT" },
                en: { c: "CONTACT", s: "SKILLS", p: "PROFILE", e: "EDUCATION", ex: "EXPERIENCE" },
                de: { c: "KONTAKT", s: "FÄHIGKEITEN", p: "PROFIL", e: "BILDUNG", ex: "ERFAHRUNG" }
            };
            const L = (k) => (mode === 'hu' ? dicts.hu[k] : (isOnly ? dicts[lang][k] : dicts.hu[k] + " / " + dicts[lang][k]));

            // Dinamikus elemek feldolgozása
            const getEntries = async (type) => {
                let html = "";
                const entries = document.querySelectorAll('#' + type + '-list .dynamic-entry');
                for (let e of entries) {
                    const main = e.querySelector('.e-main').value;
                    const sub = e.querySelector('.e-sub').value;
                    const desc = e.querySelector('.e-desc').value;
                    const trDesc = (mode !== 'hu') ? await translate(desc, lang) : "";
                    
                    html += `<div style="margin-bottom:15px">
                        <strong style="font-size:14px; color:#333;">${main}</strong><br>
                        <small style="color:#777;">${sub}</small><br>
                        <span style="font-weight:600; color:${szin}; text-transform:uppercase;">${!isOnly ? desc : trDesc}</span>
                        ${!isOnly && trDesc ? `<br><small style="color:#888; font-style:italic">${trDesc}</small>` : ''}
                    </div>`;
                }
                return html;
            };

            const eduHtml = await getEntries('edu');
            const workHtml = await getEntries('work');

            const htmlContent = `<html><head><style>
                body { font-family: sans-serif; display: flex; margin: 0; min-height: 100vh; }
                .sidebar { background: ${szin}; color: white; width: 30%; padding: 30px; -webkit-print-color-adjust: exact; }
                .main { width: 70%; padding: 40px; background: white; }
                .p-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; object-fit: cover; margin-bottom: 20px; }
                h1 { margin:0; text-transform: uppercase; color: ${szin}; font-size: 24px; }
                h3 { border-bottom: 2px solid ${szin}; color: ${szin}; text-transform: uppercase; font-size: 14px; margin-top: 25px; }
                .sidebar h3 { color: white; border-bottom: 1px solid rgba(255,255,255,0.3); }
                p { font-size: 13px; line-height: 1.6; margin-bottom: 10px; white-space: pre-line; }
                .no-print { position: fixed; top: 10px; right: 10px; padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
            </style></head><body>
                <button class="no-print" onclick="window.print()">MENTÉS PDF-KÉNT</button>
                <div class="sidebar">
                    ${profilKepData ? `<img src="${profilKepData}" class="p-img">` : ''}
                    <h3>${L('c')}</h3>
                    <p>${!isOnly ? adatok.cim : tr.cim}</p>
                    <p>${adatok.tel}<br>${adatok.email}</p>
                    ${adatok.kesz ? `<h3>${L('s')}</h3><p>${!isOnly ? adatok.kesz : tr.kesz}</p>` : ''}
                </div>
                <div class="main">
                    <h1>${!isOnly ? adatok.nev : tr.nev}</h1>
                    ${adatok.bemutat ? `<h3>${L('p')}</h3><p>${!isOnly ? adatok.bemutat : tr.bemutat}</p>` : ''}
                    ${eduHtml ? `<h3>${L('e')}</h3>${eduHtml}` : ''}
                    ${workHtml ? `<h3>${L('ex')}</h3>${workHtml}` : ''}
                </div></body></html>`;

            const win = window.open("", "_blank");
            win.document.write(htmlContent);
            win.document.close();
            btn.innerText = "GENERÁLÁS / GENERATE";
        }
    </script>
</body>
</html>
