<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Global Control v3.7.0</title>
    <style>
        :root { --main-color: #3498db; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; overflow: hidden; }
        
        .editor-side { width: 35%; background: #1a1a1a; color: #ecf0f1; padding: 20px; overflow-y: auto; border-right: 4px solid var(--main-color); }
        .logo-box { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .logo-icon { width: 35px; height: 35px; border: 3px solid var(--main-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--main-color); font-size: 20px; }
        
        .ats-box { background: #2c3e50; border-left: 5px solid #f1c40f; padding: 12px; margin-bottom: 20px; font-size: 11px; }
        .ats-box p { margin: 3px 0; color: #bdc3c7; }

        .control-group { margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        label { display: block; margin-bottom: 3px; font-weight: bold; color: #3498db; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        
        .lang-btns { display: flex; gap: 4px; margin-bottom: 15px; }
        .lang-btns button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #ccc; font-weight: bold; }
        .active-lang { background: var(--main-color) !important; color: white !important; }
        
        .job-entry { background: #252525; padding: 12px; border-radius: 4px; margin-bottom: 10px; border-left: 3px solid var(--main-color); }
        .add-btn { background: var(--main-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }

        .preview-side { width: 65%; display: flex; justify-content: center; padding: 30px; overflow-y: auto; background: #525659; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 45px; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; color: #333; transition: 0.3s; }
        
        .cv-header { border-bottom: 3px solid var(--main-color); padding-bottom: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 20px; }
        #photo-preview { width: 130px; height: 160px; object-fit: cover; display: none; border-radius: 4px; }
        .contact-info { font-size: 13px; color: #444; }
        .contact-label { font-weight: bold; color: var(--main-color); margin-right: 10px; }
        
        h3 { border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--main-color); text-transform: uppercase; font-size: 14px; margin-top: 20px; }
        .job-item { margin-bottom: 12px; }
        .job-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }

        @media print { .editor-side { display: none; } .preview-side { width: 100%; padding: 0; background: white; } .cv-paper { box-shadow: none; margin: 0; width: 100%; } }
    </style>
</head>
<body>

    <div class="editor-side">
        <div class="logo-box"><div class="logo-icon">X</div><h1 style="color: #3498db; font-size: 20px; margin: 0;">Global Control</h1></div>
        
        <div class="ats-box">
            <strong id="ats-title" style="color:#f1c40f;">ATS STRATEGY BOARD</strong>
            <div id="ats-tips"></div>
        </div>

        <div class="lang-btns">
            <button id="btn-hu" onclick="changeLang('hu')">HU</button>
            <button id="btn-en" onclick="changeLang('en')">EN</button>
            <button id="btn-de" onclick="changeLang('de')">DE</button>
        </div>

        <div class="control-group"><label id="lbl-style">Style</label><select id="style-select" onchange="updateStyle()"></select></div>
        <div class="control-group"><label id="lbl-theme">Color</label><select id="theme-color" onchange="updateTheme()"></select></div>
        <div class="control-group"><label id="lbl-photo">Photo</label><input type="file" accept="image/*" onchange="loadPhoto(event)"></div>
        <div class="control-group"><label id="lbl-name">Full Name</label><input type="text" id="in-name" oninput="updatePreview()"></div>
        
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 1;"><label id="lbl-zip">ZIP</label><input type="text" id="in-zip" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 2;"><label id="lbl-city">City</label><input type="text" id="in-city" oninput="updatePreview()"></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 2;"><label id="lbl-street">Street</label><input type="text" id="in-street" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 1;"><label id="lbl-house">No.</label><input type="text" id="in-house" oninput="updatePreview()"></div>
        </div>
        
        <div class="control-group"><label id="lbl-phone">Phone</label><input type="text" id="in-phone" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-email">Email</label><input type="text" id="in-email" oninput="updatePreview()"></div>

        <h4 id="lbl-work-h" style="color:var(--main-color); margin:10px 0;">EXPERIENCE</h4>
        <div id="job-container"></div>
        <button class="add-btn" onclick="addJobField()">+ ADD WORKPLACE</button>

        <div class="control-group"><label id="lbl-summary">Summary</label><textarea id="in-summary" rows="2" oninput="updatePreview()"></textarea></div>
        <div class="control-group"><label id="lbl-skills">Skills</label><input type="text" id="in-skills" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-langs">Languages</label><input type="text" id="in-langs" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-license">License</label><input type="text" id="in-license" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-hobby">Hobbies</label><input type="text" id="in-hobby" oninput="updatePreview()"></div>

        <button onclick="window.print()" id="btn-print" style="background:#27ae60; color:white; padding:18px; width:100%; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">PRINT PDF</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header" id="cv-header">
                <img id="photo-preview" src="">
                <div class="header-text">
                    <h1 id="out-name" style="margin:0; font-size: 28px;">Your Name</h1>
                    <div class="contact-info" id="out-contact"></div>
                </div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>

    <script>
        const translatorDB = {
            "Vagyonőr": { en: "Security Guard", de: "Sicherheitskraft" },
            "Felügyelet Vezető": { en: "Supervision Lead", de: "Überwachungsleiter" },
            "Csapatban dolgozom": { en: "Team player", de: "Teamfähig" },
            "B kategória": { en: "Category B license", de: "Klasse B" },
            "Középfok B2": { en: "Intermediate B2", de: "Mittelstufe B2" },
            "utca": { en: "street", de: "straße" },
            "Zenehallgatás": { en: "Listening to music", de: "Musik hören" }
        };

        const dictionary = {
            hu: { name:"Név", zip:"Irsz", city:"Város", street:"Utca", house:"Házszám", phone:"Tel", email:"Email", summary:"Bemutatkozás", work:"Munkahelyek", skills:"Készségek", langs:"Nyelvek", license:"Jogosítvány", hobby:"Hobbi", print:"PDF MENTÉS", tips:["1. Tiszta szöveg.", "2. Kulcsszavak.", "3. Üres mezők rejtve."] },
            en: { name:"Name", zip:"ZIP", city:"City", street:"Street", house:"No.", phone:"Phone", email:"Email", summary:"Summary", work:"Work History", skills:"Skills", langs:"Languages", license:"License", hobby:"Hobbies", print:"SAVE PDF", tips:["1. Clean text.", "2. Keywords.", "3. Empty hidden."] },
            de: { name:"Name", zip:"PLZ", city:"Stadt", street:"Straße", house:"Hausnr.", phone:"Tel", email:"Email", summary:"Profil", work:"Erfahrung", skills:"Kenntnisse", langs:"Sprachen", license:"Führerschein", hobby:"Hobby", print:"PDF SPEICHERN", tips:["1. Klarer Text.", "2. Keywords.", "3. Ausgeblendet."] }
        };

        let currentLang = 'hu', jobCount = 0;
        const colorValues = ["#3498db", "#e67e22", "#1a1a1a", "#27ae60", "#c0392b"];

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btns button').forEach(b => b.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            const f = ['name','zip','city','street','house','phone','email','summary','skills','langs','license','hobby'];
            f.forEach(k => { document.getElementById('lbl-'+k).innerText = dictionary[lang][k]; });
            document.getElementById('ats-tips').innerHTML = dictionary[lang].tips.map(t => `<p>${t}</p>`).join("");
            document.getElementById('btn-print').innerText = dictionary[lang].print;
            document.getElementById('lbl-work-h').innerText = dictionary[lang].work;

            const styleS = document.getElementById('style-select'); styleS.innerHTML = "";
            ["Modern", "Classic", "Centered", "Creative"].forEach((s, i) => { let o = document.createElement('option'); o.value = "style-"+(i+1); o.innerText = s; styleS.appendChild(o); });
            const colorS = document.getElementById('theme-color'); colorS.innerHTML = "";
            dictionary.hu.tips.forEach((c, i) => { if(colorValues[i]) { let o = document.createElement('option'); o.value = colorValues[i]; o.innerText = "Color "+(i+1); colorS.appendChild(o); } });

            updatePreview();
        }

        function addJobField() {
            jobCount++;
            const div = document.createElement('div');
            div.className = 'job-entry';
            div.innerHTML = `<input type="text" placeholder="Company" class="j-c" oninput="updatePreview()"><input type="text" placeholder="Position" class="j-p" style="margin-top:5px" oninput="updatePreview()"><input type="text" placeholder="Year" class="j-y" style="margin-top:5px" oninput="updatePreview()">`;
            document.getElementById('job-container').appendChild(div);
        }

        function smartTranslate(text) {
            if (!text || currentLang === 'hu') return text;
            let result = text;
            for (let k in translatorDB) {
                let reg = new RegExp(k, "gi");
                if (text.match(reg)) result = result.replace(reg, translatorDB[k][currentLang]);
            }
            return result;
        }

        function updatePreview() {
            const name = document.getElementById('in-name').value;
            const p = name.trim().split(" ");
            document.getElementById('out-name').innerText = (p.length >= 2 && currentLang !== 'hu') ? p[p.length-1] + " " + p.slice(0, -1).join(" ") : name || "Your Name";
            
            const zip = document.getElementById('in-zip').value;
            const city = smartTranslate(document.getElementById('in-city').value);
            const street = smartTranslate(document.getElementById('in-street').value);
            const house = document.getElementById('in-house').value;
            let addr = (currentLang !== 'hu') ? `${zip} ${city}, ${street} ${house}` : `${city}, ${street} ${house}, ${zip}`;

            document.getElementById('out-contact').innerHTML = `<div class="contact-row"><b>Tel:</b> ${document.getElementById('in-phone').value}</div><div class="contact-row"><b>Email:</b> ${document.getElementById('in-email').value}</div><div class="contact-row"><b>Address:</b> ${addr}</div>`;

            let main = "";
            const sum = smartTranslate(document.getElementById('in-summary').value);
            if(sum) main += `<p><i>${sum}</i></p>`;
            
            let jH = "";
            document.querySelectorAll('.job-entry').forEach(e => {
                const c = e.querySelector('.j-c').value, p = smartTranslate(e.querySelector('.j-p').value), y = e.querySelector('.j-y').value;
                if(c || p) jH += `<div class="job-item"><div class="job-header"><span>${p}</span><span>${y}</span></div><div>* ${c}</div></div>`;
            });
            if(jH) main += `<h3>${dictionary[currentLang].work}</h3>` + jH;

            ['skills','langs','license','hobby'].forEach(k => {
                const v = smartTranslate(document.getElementById('in-'+k).value);
                if(v) main += `<h3>${dictionary[currentLang][k]}</h3><p>${v}</p>`;
            });
            document.getElementById('main-content').innerHTML = main;
        }

        function updateStyle() { document.body.className = document.getElementById('style-select').value; }
        function loadPhoto(e) { const img = document.getElementById('photo-preview'); img.src = URL.createObjectURL(e.target.files[0]); img.style.display = "block"; }
        function updateTheme() { const c = document.getElementById('theme-color').value; document.documentElement.style.setProperty('--main-color', c); document.getElementById('out-name').style.color = c; document.getElementById('cv-header').style.borderColor = c; }
        window.onload = () => { changeLang('hu'); };
    </script>
</body>
</html>
