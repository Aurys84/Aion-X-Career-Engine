<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Career Engine v1.1.0</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        
        /* Bal oldal: Kontroll Panel */
        .editor-side { width: 35%; background: #1a1a1a; color: #ecf0f1; padding: 25px; overflow-y: auto; border-right: 4px solid #3498db; }
        
        /* Jobb oldal: Élő Előnézet */
        .preview-side { width: 65%; display: flex; justify-content: center; align-items: flex-start; padding: 30px; overflow-y: auto; background: #dfe4ea; }
        
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); box-sizing: border-box; }

        .control-group { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #3498db; text-transform: uppercase; font-size: 12px; }
        input, textarea, select { width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; }
        
        .lang-btns { display: flex; gap: 5px; margin-bottom: 20px; }
        .lang-btns button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .active-lang { background: #3498db !important; color: white; }
    </style>
</head>
<body>

    <div class="editor-side">
        <h2 style="color: #3498db;">Aion-X Global Control</h2>
        
        <div class="control-group">
            <label>Nyelv / Language / Sprache</label>
            <div class="lang-btns">
                <button id="btn-hu" class="active-lang" onclick="changeLang('hu')">HU</button>
                <button id="btn-en" onclick="changeLang('en')">EN</button>
                <button id="btn-de" onclick="changeLang('de')">DE</button>
            </div>
        </div>

        <div class="control-group">
            <label id="lbl-name">Teljes Név</label>
            <input type="text" id="in-name" placeholder="John Doe" oninput="updatePreview()">
        </div>

        <div class="control-group">
            <label id="lbl-summary">Szakmai Bemutatkozás</label>
            <textarea id="in-summary" rows="5" placeholder="..." oninput="updatePreview()"></textarea>
        </div>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-content">
            <h1 id="out-name" style="color: #1a1a1a; margin: 0;">Teljes Név</h1>
            <hr id="line" style="border: 1px solid #3498db;">
            <p id="out-summary" style="white-space: pre-wrap; color: #555; line-height: 1.6;">A bemutatkozásod itt fog megjelenni élőben...</p>
        </div>
    </div>

    <script>
        // Aion-X Szakmai Adatbázis (Példa a tűpontos fordításra)
        const dictionary = {
            hu: { name: "Teljes Név", summary: "Szakmai Bemutatkozás", placeholder: "Írj magadról..." },
            en: { name: "Full Name", summary: "Professional Summary", placeholder: "Write about yourself..." },
            de: { name: "Vollständiger Name", summary: "Kurzprofil", placeholder: "Schreiben Sie über sich..." }
        };

        let currentLang = 'hu';

        function changeLang(lang) {
            currentLang = lang;
            // Gombok stílusa
            document.querySelectorAll('.lang-btns button').forEach(btn => btn.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            
            // Címkék cseréje (Német precizitás!)
            document.getElementById('lbl-name').innerText = dictionary[lang].name;
            document.getElementById('lbl-summary').innerText = dictionary[lang].summary;
            document.getElementById('in-summary').placeholder = dictionary[lang].placeholder;
            
            updatePreview();
        }

        function updatePreview() {
            const nameValue = document.getElementById('in-name').value;
            const summaryValue = document.getElementById('in-summary').value;

            document.getElementById('out-name').innerText = nameValue || dictionary[currentLang].name;
            document.getElementById('out-summary').innerText = summaryValue || dictionary[currentLang].placeholder;
        }
    </script>
</body>
</html>
