<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Career Engine v1.1.0</title>
    <link rel="stylesheet" href="styles.css?v=1.1">
</head>
<body>

    <div class="editor-side">
        <h1 style="color: #3498db; font-size: 24px; margin-bottom: 5px;">Aion-X Global Control</h1>
        <p style="font-size: 10px; color: #777; margin-top: 0;">LABORATORY STATUS: ACTIVE</p>
        
        <div class="control-group">
            <label>Language / Sprache / Nyelv</label>
            <div class="lang-btns">
                <button id="btn-hu" onclick="changeLang('hu')">HU</button>
                <button id="btn-en" onclick="changeLang('en')">EN</button>
                <button id="btn-de" onclick="changeLang('de')">DE</button>
            </div>
        </div>

        <div class="control-group">
            <label id="lbl-theme">Mátrix Design (Color)</label>
            <select id="theme-color" onchange="updateTheme()">
                <option value="#3498db">Aion Kék</option>
                <option value="#1a3a5a">Éjfélkék</option>
                <option value="#4a4a4a">Antracit</option>
                <option value="#2ecc71">Smaragd</option>
                <option value="#e67e22">Norbi Narancs</option>
                <option value="#e74c3c">Vörös</option>
                <option value="#8e44ad">Lila</option>
                <option value="#2c3e50">Pala</option>
                <option value="#d35400">Téglavörös</option>
                <option value="#1abc9c">Türkiz</option>
            </select>
        </div>

        <div class="control-group">
            <label id="lbl-name">Name</label>
            <input type="text" id="in-name" oninput="updatePreview()">
        </div>

        <div class="control-group">
            <label id="lbl-summary">Professional Summary</label>
            <textarea id="in-summary" rows="5" oninput="updatePreview()"></textarea>
        </div>
    </div>

    <div class="preview-side">
        <div class="cv-paper">
            <h1 id="out-name" style="transition: 0.3s;">Your Name</h1>
            <hr id="line" style="border: 2px solid #3498db; margin: 15px 0; transition: 0.3s;">
            <p id="out-summary" style="white-space: pre-wrap;">Summary preview...</p>
        </div>
    </div>

    <script src="dictionary.js?v=1.1"></script>
    <script src="engine.js?v=1.1"></script>
</body>
</html>
