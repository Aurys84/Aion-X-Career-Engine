<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Global Control v2.3.0</title>
    <style>
        :root { --main-color: #3498db; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .editor-side { width: 35%; background: #1a1a1a; color: #ecf0f1; padding: 25px; overflow-y: auto; border-right: 4px solid var(--main-color); }
        .control-group { margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        label { display: block; margin-bottom: 3px; font-weight: bold; color: #3498db; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .lang-btns { display: flex; gap: 4px; margin-bottom: 15px; }
        .lang-btns button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #ccc; font-weight: bold; }
        .active-lang { background: var(--main-color) !important; color: white !important; }
        
        .logo-box { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .logo-icon { width: 30px; height: 30px; border: 3px solid #3498db; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #3498db; font-size: 18px; }

        .ats-box { background: #2c3e50; border-left: 4px solid #f1c40f; padding: 12px; margin-bottom: 20px; font-size: 11px; }
        .ats-box ul { margin: 5px 0 0; padding-left: 15px; color: #bdc3c7; }
        .print-btn { background: #27ae60; color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .preview-side { width: 65%; display: flex; justify-content: center; padding: 30px; overflow-y: auto; background: #525659; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; color: #333; transition: all 0.3s; }
        
        /* 10 DRASZTIKUS STÍLUS DEFINÍCIÓ */
        .style-1 .cv-body { display: flex; gap: 30px; } 
        .style-2 .cv-paper { border-top: 20px solid var(--main-color); }
        .style-3 .cv-header { flex-direction: column; text-align: center; }
        .style-4 .cv-paper { font-family: 'Courier New', Courier, monospace; }
        .style-5 .cv-header { background: #f4f4f4; border: 1px solid #ddd; padding: 20px; }
        .style-6 .cv-paper { border-left: 40px solid var(--main-color); }
        .style-7 .header-text h1 { font-size: 48px; border-bottom: 8px solid var(--main-color); }
        .style-8 .cv-paper { line-height: 1.8; font-size: 12px; }
        .style-9 #photo-preview { border-radius: 50%; border: 4px solid var(--main-color); }
        .style-10 .cv-paper { border: 15px double var(--main-color); background: #fcfcfc; }

        .cv-header { border-bottom: 3px solid var(--main-color); padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
        #photo-preview { width: 130px; height: 150px; object-fit: cover; display: none; }
        .contact-info { font-size: 13px; color: #444; margin-top: 8px; }
        h3 { border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--main-color); text-transform: uppercase; font-size: 14px; margin-top: 25px; }

        @media print { .editor-side { display: none; } .preview-side { width: 100%; padding: 0; background: white; } .cv-paper { box-shadow: none; margin: 0; } }
    </style>
</head>
<body class="style-1">

    <div class="editor-side">
        <div class="logo-box"><div class="logo-icon">X</div><h1 style="color: #3498db; font-size: 20px; margin: 0;">Global Control</h1></div>
        
        <div class="ats-box">
            <strong id="ats-title">ATS STRATEGY:</strong>
            <ul id="ats-list"></ul>
        </div>

        <div class="control-group">
            <label id="lbl-lang">Language Selection</label>
            <div class="lang-btns">
                <button id="btn-hu" onclick="changeLang('hu')">HU</button>
                <button id="btn-en" onclick="changeLang('en')">EN</button>
                <button id="btn-de" onclick="changeLang('de')">DE</button>
            </div>
        </div>

        <div class="control-group"><label id="lbl-style">Style</label><select id="style-select" onchange="updateStyle()"></select></div>
        <div class="control-group"><label id="lbl-theme">Color</label><select id="theme-color" onchange="updateTheme()"></select></div>
        <div class="control-group"><label id="lbl-photo">Photo</label><input type="file" accept="image/*" onchange="loadPhoto(event)"></div>
        <div class="control-group"><label id="lbl-name">Full Name</label><input type="text" id="in-name" oninput="saveAndPreview()"></div>
        
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 1;"><label id="lbl-zip">ZIP</label><input type="text" id="in-zip" oninput="saveAndPreview()"></div>
            <div class="control-group" style="flex: 2;"><label id="lbl-city">City</label><input type="text" id="in-city" oninput="saveAndPreview()"></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 2;"><label id="lbl-street">Street</label><input type="text" id="in-street" oninput="saveAndPreview()"></div>
            <div class="control-group" style="flex: 1;"><label id="lbl-house">No.</label><input type="text" id="in-house" oninput="saveAndPreview()"></div>
        </div>
        
        <div class="control-group"><label id="lbl-phone">Phone</label><input type="text" id="in-phone" oninput="saveAndPreview()"></div>
        <div class="control-group"><label id="lbl-email">Email</label><input type="text" id="in-email" oninput="saveAndPreview()"></div>
        <div class="control-group"><label id="lbl-summary">Summary</label><textarea id="in-summary" rows="2" oninput="saveAndPreview()"></textarea></div>
        <div class="control-group"><label id="lbl-exp">Experience</label><textarea id="in-exp" rows="3" oninput="saveAndPreview()"></textarea></div>
        <div class="control-group"><label id="lbl-skills">Skills</label><input type="text" id="in-skills" oninput="saveAndPreview()"></div>
        <div class="control-group"><label id="lbl-langs">Languages</label><input type="text" id="in-langs" oninput="saveAndPreview()"></div>
        <div class="control-group"><label id="lbl-license">License</label><input type="text" id="in-license" oninput="saveAndPreview()"></div>
        <div class="control-group"><label id="lbl-hobby">Hobby</label><input type="text" id="in-hobby" oninput="saveAndPreview()"></div>

        <button class="print-btn" onclick="window.print()" id="btn-print">PRINT PDF</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header" id="cv-header">
                <img id="photo-preview" src="">
                <div class="header-text"><h1 id="out-name" style="margin:0; font-size: 28px;">Name</h1><div class="contact-info" id="out-contact"></div></div>
            </div>
            <div class="cv-body"><div class="main-col"><div id="main-content"></div></div><div class="side-col"></div></div>
        </div>
    </div>

    <script>
        let userData = {
            hu: { name: "", zip: "", city: "", street: "", house: "", phone: "", email: "", summary: "", exp: "", skills: "", langs: "", license: "", hobby: "" },
            en: { name: "", zip: "", city: "", street: "", house: "", phone: "", email: "", summary: "", exp: "", skills: "", langs: "", license: "", hobby: "" },
            de: { name: "", zip: "", city: "", street: "", house: "", phone: "", email: "", summary: "", exp: "", skills: "", langs: "", license: "", hobby: "" }
        };

        const dictionary = {
            hu: { 
                lang: "Nyelv", style: "Stílus (10)", theme: "Szín (10)", name: "Teljes Név", zip: "Irsz.", city: "Város", street: "Utca", house: "Házszám", phone: "Telefon", email: "E-mail", summary: "Profil", exp: "Tapasztalat", skills: "Készségek", langs: "Nyelvek", license: "Jogosítvány", hobby: "Hobbi", print: "PDF MENTÉS", photo: "Fotó",
                atsTips: ["Használj kulcsszavakat.", "Tiszta szöveg a nyerő.", "PDF-ben ments, ne képként."],
                labels: { p: "Tel:", e: "Email:", a: "Cím:" },
                styles: ["Modern", "Klasszikus", "Centrált", "Minimalista", "Technikai", "Kreatív", "Menedzser", "Akadémiai", "Junior", "Aion-X"],
                colors: ["Aion Kék", "Narancs", "Fekete", "Smaragd", "Vörös", "Lila", "Arany", "Ezüst", "Türkiz", "Pala"]
            },
            en: { 
                lang: "Language", style: "Style (10)", theme: "Color (10)", name: "Full Name", zip: "ZIP", city: "City", street: "Street", house: "No.", phone: "Phone", email: "Email", summary: "Summary", exp: "Experience", skills: "Skills", langs: "Languages", license: "License", hobby: "Hobby", print: "SAVE PDF", photo: "Photo",
                atsTips: ["Use keywords.", "Clean text is best.", "Save as text PDF."],
                labels: { p: "Phone:", e: "Email:", a: "Address:" },
                styles: ["Modern", "Classic", "Centered", "Minimal", "Technical", "Creative", "Manager", "Academic", "Junior", "Aion-X"],
                colors: ["Aion Blue", "Orange", "Black", "Emerald", "Red", "Purple", "Gold", "Silver", "Turquoise", "Slate"]
            },
            de: { 
                lang: "Sprache", style: "Stil (10)", theme: "Farbe (10)", name: "Name", zip: "PLZ", city: "Stadt", street: "Straße", house: "Hausnr.", phone: "Tel.", email: "Email", summary: "Profil", exp: "Erfahrung", skills: "Kenntnisse", langs: "Sprachen", license: "Führerschein", hobby: "Hobby", print: "PDF SPEICHERN", photo: "Foto",
                atsTips: ["Keywords nutzen.", "Klarer Text.", "Als Text-PDF speichern."],
                labels: { p: "Tel:", e: "Email:", a: "Adresse:" },
                styles: ["Modern", "Klassisch", "Zentriert", "Minimal", "Technisch", "Kreativ", "Management", "Akademisch", "Junior", "Aion-X Spezial"],
                colors: ["Aion Blau", "Orange", "Schwarz", "Smaragd", "Rot", "Lila", "Gold", "Silber", "Türkis", "Schiefer"]
            }
        };

        const colorValues = ["#3498db", "#e67e22", "#1a1a1a", "#27ae60", "#c0392b", "#8e44ad", "#f1c40f", "#95a5a6", "#1abc9c", "#34495e"];
        let currentLang = 'hu';

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btns button').forEach(btn => btn.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            
            const fields = ['lang', 'style', 'theme', 'photo', 'name', 'zip', 'city', 'street', 'house', 'phone', 'email', 'summary', 'exp', 'skills', 'langs', 'license', 'hobby'];
            fields.forEach(f => { document.getElementById('lbl-' + f).innerText = dictionary[lang][f]; });
            
            const list = document.getElementById('ats-list'); list.innerHTML = "";
            dictionary[lang].atsTips.forEach(tip => { let li = document.createElement('li'); li.innerText = tip; list.appendChild(li); });
            
            const styleS = document.getElementById('style-select'); styleS.innerHTML = "";
            dictionary[lang].styles.forEach((s, i) => { let o = document.createElement('option'); o.value = "style-"+(i+1); o.innerText = s; styleS.appendChild(o); });
            const colorS = document.getElementById('theme-color'); colorS.innerHTML = "";
            dictionary[lang].colors.forEach((c, i) => { let o = document.createElement('option'); o.value = colorValues[i]; o.innerText = c; colorS.appendChild(o); });

            fields.slice(4).forEach(f => { document.getElementById('in-' + f).value = userData[lang][f]; });
            updatePreview();
        }

        function saveAndPreview() {
            const fields = ['name', 'zip', 'city', 'street', 'house', 'phone', 'email', 'summary', 'exp', 'skills', 'langs', 'license', 'hobby'];
            fields.forEach(f => { userData[currentLang][f] = document.getElementById('in-' + f).value; });
            updatePreview();
        }

        function updateStyle() { document.body.className = document.getElementById('style-select').value; }
        function loadPhoto(e) { const img = document.getElementById('photo-preview'); img.src = URL.createObjectURL(e.target.files[0]); img.style.display = "block"; }
        function updateTheme() { const c = document.getElementById('theme-color').value; document.documentElement.style.setProperty('--main-color', c); document.getElementById('out-name').style.color = c; document.getElementById('cv-header').style.borderColor = c; }

        function updatePreview() {
            const data = userData[currentLang];
            document.getElementById('out-name').innerText = data.name || dictionary[currentLang].name;
            const labels = dictionary[currentLang].labels;
            let addr = (currentLang !== 'hu') ? `${data.zip} ${data.city}, ${data.street} ${data.house}` : `${data.city}, ${data.street} ${data.house}, ${data.zip}`;
            let contactHtml = "";
            if(data.phone) contactHtml += `<div class="contact-row"><span class="contact-label">${labels.p}</span>${data.phone}</div>`;
            if(data.email) contactHtml += `<div class="contact-row"><span class="contact-label">${labels.e}</span>${data.email}</div>`;
            if(data.city || data.street) contactHtml += `<div class="contact-row"><span class="contact-label">${labels.a}</span>${addr}</div>`;
            document.getElementById('out-contact').innerHTML = contactHtml;
            
            let mainHtml = data.summary ? `<p style="font-style:italic; margin-bottom:15px;">${data.summary}</p>` : "";
            if(data.exp) mainHtml += `<h3>${dictionary[currentLang].exp}</h3><div style="white-space:pre-wrap;">${data.exp}</div>`;
            if(data.skills) mainHtml += `<h3>${dictionary[currentLang].skills}</h3><p>${data.skills}</p>`;
            if(data.langs) mainHtml += `<h3>${dictionary[currentLang].langs}</h3><p>${data.langs}</p>`;
            if(data.license) mainHtml += `<h3>${dictionary[currentLang].license}</h3><p>${data.license}</p>`;
            if(data.hobby) mainHtml += `<h3>${dictionary[currentLang].hobby}</h3><p>${data.hobby}</p>`;
            document.getElementById('main-content').innerHTML = mainHtml;
        }

        window.onload = () => { changeLang('hu'); updateTheme(); };
    </script>
</body>
</html>
