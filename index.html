<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Global Control v2.7.0</title>
    <style>
        :root { --main-color: #3498db; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .editor-side { width: 35%; background: #1a1a1a; color: #ecf0f1; padding: 20px; overflow-y: auto; border-right: 4px solid var(--main-color); }
        .logo-box { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .logo-icon { width: 35px; height: 35px; border: 3px solid var(--main-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--main-color); font-size: 20px; }
        .ats-box { background: #2c3e50; border-left: 4px solid #f1c40f; padding: 12px; margin-bottom: 20px; font-size: 11px; }
        .control-group { margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        label { display: block; margin-bottom: 3px; font-weight: bold; color: #3498db; text-transform: uppercase; font-size: 10px; }
        input, textarea, select { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; font-size: 13px; }
        .lang-btns { display: flex; gap: 4px; margin-bottom: 15px; }
        .lang-btns button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #ccc; font-weight: bold; }
        .active-lang { background: var(--main-color) !important; color: white !important; }
        .preview-side { width: 65%; display: flex; justify-content: center; padding: 30px; overflow-y: auto; background: #525659; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; color: #333; }
        .cv-header { border-bottom: 3px solid var(--main-color); padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
        #photo-preview { width: 130px; height: 160px; object-fit: cover; display: none; }
        .contact-info { font-size: 13px; color: #666; }
        h3 { border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--main-color); text-transform: uppercase; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body class="style-1">

    <div class="editor-side">
        <div class="logo-box"><div class="logo-icon">X</div><h1 style="color: #3498db; font-size: 20px; margin: 0;">Global Control</h1></div>
        <div class="ats-box"><strong id="ats-title" style="color: #f1c40f;">ATS TIPS:</strong><div id="ats-tips"></div></div>
        <div class="lang-btns">
            <button id="btn-hu" onclick="changeLang('hu')">HU</button>
            <button id="btn-en" onclick="changeLang('en')">EN</button>
            <button id="btn-de" onclick="changeLang('de')">DE</button>
        </div>
        <div class="control-group"><label id="lbl-style">Style</label><select id="style-select" onchange="updateStyle()"></select></div>
        <div class="control-group"><label id="lbl-theme">Color</label><select id="theme-color" onchange="updateTheme()"></select></div>
        <div class="control-group"><label id="lbl-photo">Photo</label><input type="file" accept="image/*" onchange="loadPhoto(event)"></div>
        <div class="control-group"><label id="lbl-name">Full Name</label><input type="text" id="in-name" oninput="updatePreview()"></div>
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 1;"><label id="lbl-zip">ZIP</label><input type="text" id="in-zip" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 2;"><label id="lbl-city">City</label><input type="text" id="in-city" oninput="updatePreview()"></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 2;"><label id="lbl-street">Street</label><input type="text" id="in-street" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 1;"><label id="lbl-house">No.</label><input type="text" id="in-house" oninput="updatePreview()"></div>
        </div>
        <div class="control-group"><label id="lbl-phone">Phone</label><input type="text" id="in-phone" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-email">Email</label><input type="text" id="in-email" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-summary">Summary</label><textarea id="in-summary" rows="2" oninput="updatePreview()"></textarea></div>
        <div class="control-group"><label id="lbl-exp">Experience</label><textarea id="in-exp" rows="3" oninput="updatePreview()"></textarea></div>
        <div class="control-group"><label id="lbl-skills">Skills</label><input type="text" id="in-skills" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-langs">Languages</label><input type="text" id="in-langs" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-license">License</label><input type="text" id="in-license" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-hobby">Hobby</label><input type="text" id="in-hobby" oninput="updatePreview()"></div>
        <button class="print-btn" onclick="window.print()" id="btn-print" style="background:#27ae60; color:white; width:100%; padding:15px; border:none; border-radius:5px; font-weight:bold;">PDF PRINT</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header" id="cv-header">
                <img id="photo-preview" src="">
                <div class="header-text"><h1 id="out-name" style="margin:0; font-size: 28px;">Your Name</h1><div class="contact-info" id="out-contact"></div></div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>

    <script>
        // MÁTRIX KERESZTBE FORDÍTÓ SZÓTÁR (Amit beírsz, ezt figyeli)
        const matrixTranslator = {
            "Csapatban dolgozom": { en: "Team player", de: "Teamfähig" },
            "Fejlesztés": { en: "Development", de: "Entwicklung" },
            "Angol -Német A2": { en: "English - German A2", de: "Englisch - Deutsch A2" },
            "B kategória": { en: "Category B", de: "Klasse B" },
            "Szabadság utca": { en: "Szabadság street", de: "Szabadság straße" },
            "Meggyeskovácsi": { en: "Meggyeskovácsi", de: "Meggyeskovácsi" },
            "Tesztbejegyzés": { en: "Test entry", de: "Testeintrag" }
        };

        const dictionary = {
            hu: { lang: "Nyelv", style: "Stílus", theme: "Szín", name: "Teljes Név", zip: "Irsz.", city: "Város", street: "Utca", house: "Házszám", phone: "Tel:", email: "Email:", summary: "Bemutatkozás", exp: "Tapasztalat", skills: "Készségek", langs: "Nyelvek", license: "Jogosítvány", hobby: "Hobbi", print: "PDF MENTÉS", photo: "Fotó", atsTips: ["1. Tiszta szöveg.", "2. Kulcsszavak.", "3. Leeresztett mezők elrejtve."], styles: ["Modern", "Klasszikus", "Centrált"], colors: ["Aion Kék", "Narancs", "Fekete"] },
            en: { lang: "Language", style: "Style", theme: "Color", name: "Full Name", zip: "ZIP", city: "City", street: "Street", house: "No.", phone: "Tel:", email: "Email:", summary: "Summary", exp: "Experience", skills: "Skills", langs: "Languages", license: "License", hobby: "Hobby", print: "SAVE PDF", photo: "Photo", atsTips: ["1. Clean text.", "2. Keywords.", "3. Empty fields hidden."], styles: ["Modern", "Classic", "Centered"], colors: ["Aion Blue", "Orange", "Black"] },
            de: { lang: "Sprache", style: "Stil", theme: "Farbe", name: "Name", zip: "PLZ", city: "Stadt", street: "Straße", house: "Hausnr.", phone: "Tel:", email: "Email:", summary: "Profil", exp: "Erfahrung", skills: "Kenntnisse", langs: "Sprachen", license: "Führerschein", hobby: "Hobby", print: "PDF SPEICHERN", photo: "Foto", atsTips: ["1. Klarer Text.", "2. Keywords.", "3. Leere Felder aus."], styles: ["Modern", "Klassisch", "Zentriert"], colors: ["Aion Blau", "Orange", "Black"] }
        };

        let currentLang = 'hu';
        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btns button').forEach(b => b.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            
            // Fix feliratok fordítása
            const fields = ['lang', 'style', 'theme', 'photo', 'name', 'zip', 'city', 'street', 'house', 'phone', 'email', 'summary', 'exp', 'skills', 'langs', 'license', 'hobby'];
            fields.forEach(f => { document.getElementById('lbl-' + f).innerText = dictionary[lang][f]; });
            document.getElementById('ats-tips').innerHTML = dictionary[lang].atsTips.map(t => `<p>${t}</p>`).join("");

            updatePreview();
        }

        // A KERESZTBE FORDÍTÓ LOGIKA
        function smartCrossTranslate(text) {
            if (!text || currentLang === 'hu') return text;
            for (let huKey in matrixTranslator) {
                if (text.includes(huKey)) return matrixTranslator[huKey][currentLang];
            }
            return text;
        }

        function flipName(name) {
            if (!name) return "";
            let p = name.trim().split(" ");
            return (p.length >= 2 && currentLang !== 'hu') ? p[p.length - 1] + " " + p.slice(0, -1).join(" ") : name;
        }

        function updatePreview() {
            const name = document.getElementById('in-name').value;
            const zip = document.getElementById('in-zip').value;
            const city = smartCrossTranslate(document.getElementById('in-city').value);
            const street = smartCrossTranslate(document.getElementById('in-street').value);
            const house = document.getElementById('in-house').value;

            document.getElementById('out-name').innerText = flipName(name) || dictionary[currentLang].name;
            
            let addr = (currentLang !== 'hu') ? `${zip} ${city}, ${street} ${house}` : `${city}, ${street} ${house}, ${zip}`;
            document.getElementById('out-contact').innerHTML = `<div>${dictionary[currentLang].phone} ${document.getElementById('in-phone').value}</div><div>${dictionary[currentLang].email} ${document.getElementById('in-email').value}</div><div><b>${dictionary[currentLang].city}:</b> ${addr}</div>`;

            let html = "";
            const sections = ['summary', 'exp', 'skills', 'langs', 'license', 'hobby'];
            sections.forEach(s => {
                const val = smartCrossTranslate(document.getElementById('in-' + s).value);
                if(val) html += s==='summary' ? `<p><i>${val}</i></p>` : `<h3>${dictionary[currentLang][s]}</h3><p>${val}</p>`;
            });
            document.getElementById('main-content').innerHTML = html;
        }

        function updateStyle() { document.body.className = document.getElementById('style-select').value; }
        function loadPhoto(e) { const img = document.getElementById('photo-preview'); img.src = URL.createObjectURL(e.target.files[0]); img.style.display = "block"; }
        function updateTheme() { const c = document.getElementById('theme-color').value; document.documentElement.style.setProperty('--main-color', c); document.getElementById('out-name').style.color = c; document.getElementById('cv-header').style.borderColor = c; }
        window.onload = () => { changeLang('hu'); };
    </script>
</body>
</html>
