<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Career-Engine v57.0 - A&N Visual</title>
    <style>
        :root { --main-color: #007bb5; --bg: #0d0d0d; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #000; color: #eee; transition: 0.3s; }
        .editor-side { width: 42%; padding: 25px; overflow-y: auto; background: #111; border-right: 3px solid var(--main-color); }
        .preview-side { width: 58%; background: #333; display: flex; justify-content: center; padding: 40px; overflow-y: auto; }
        .logo-area { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .brand-circle { width: 45px; height: 45px; background: var(--main-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; border: 2px solid #fff; font-size: 20px; }
        .info-panel { background: #1a3a5a; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid #f1c40f; font-size: 13px; }
        .lang-grid { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn-lang { flex: 1; padding: 12px; border: none; background: #333; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-lang.active { background: var(--main-color); box-shadow: 0 0 10px var(--main-color); }
        .picker-row { margin-bottom: 15px; }
        .color-grid, .style-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 5px; }
        .color-btn { width: 100%; height: 30px; cursor: pointer; border-radius: 4px; border: 1px solid #444; }
        .style-btn { padding: 8px; background: #222; color: white; border: 1px solid #444; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .smart-label { display: block; margin-top: 15px; font-size: 11px; font-weight: bold; color: var(--main-color); text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; }
        .input-group { display: flex; gap: 10px; }
        .entry-box { background: #151515; padding: 15px; margin-top: 10px; border-left: 4px solid var(--main-color); border-radius: 4px; border-bottom: 1px solid #333; }
        .add-btn { background: #27ae60; color: white; width: 100%; padding: 12px; border: none; margin-top: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .print-btn { background: var(--main-color); color: white; width: 100%; padding: 18px; border: none; margin-top: 25px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 40px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        .cv-header { display: flex; gap: 20px; border-bottom: 2px solid var(--main-color); padding-bottom: 20px; margin-bottom: 20px; }
        #out-photo { width: 130px; height: 160px; object-fit: cover; border: 1px solid #ccc; }
        h1#out-name { margin: 0; color: var(--main-color); font-size: 32px; }
        h3 { border-bottom: 1px solid #eee; color: var(--main-color); padding-bottom: 5px; margin-top: 25px; text-transform: uppercase; }

        /* Styles 1-10 */
        body.style-1 .cv-paper { border-top: 20px solid var(--main-color); }
        body.style-2 .cv-header { flex-direction: column; text-align: center; }
        body.style-3 .cv-header { flex-direction: row-reverse; }
        body.style-4 h3 { background: #eee; padding: 5px; border-left: 10px solid var(--main-color); }
        body.style-5 .cv-paper { font-family: 'Georgia', serif; }
        body.style-6 .cv-header { border-bottom: 10px double var(--main-color); }
        body.style-7 .cv-paper { background: #fdfdfd; border: 1px solid #ddd; }
        body.style-8 #out-name { letter-spacing: 5px; text-align: center; }
        body.style-9 .cv-header { align-items: flex-end; }
        body.style-10 .cv-paper { border: none; }

        @media print { .editor-side { display: none; } .preview-side { width: 100%; padding: 0; background: white; } .cv-paper { box-shadow: none; width: 100%; } }
    </style>
</head>
<body class="style-10">

<div class="editor-side">
    <div class="logo-area"><div class="brand-circle">A&N</div><h1 id="lbl-engineName">Career-Engine</h1></div>
    <div class="info-panel"><b id="lbl-atsTitle"></b><div id="lbl-atsTips" style="white-space: pre-wrap; margin-top: 5px;"></div></div>
    <div class="info-panel" style="background:#2c3e50; border-left-color:var(--main-color);"><b id="lbl-guideTitle"></b><p id="lbl-guide"></p></div>
    
    <div class="lang-grid">
        <button class="btn-lang active" onclick="setMode('hu', this)">HU</button>
        <button class="btn-lang" onclick="setMode('en', this)">EN</button>
        <button class="btn-lang" onclick="setMode('de', this)">DE</button>
    </div>

    <div class="picker-row"><label class="smart-label" id="lbl-colors">SZÍNEK</label><div class="color-grid" id="color-picker"></div></div>
    <div class="picker-row"><label class="smart-label" id="lbl-styles">STÍLUSOK</label><div class="style-grid" id="style-picker"></div></div>

    <label class="smart-label" id="lbl-photo">FOTÓ</label><input type="file" onchange="loadPhoto(event)">

    <div class="input-group">
        <div style="flex:1"><label class="smart-label" id="lbl-fName">KERESZTNÉV</label><input type="text" id="in-firstName" oninput="updatePreview()"></div>
        <div style="flex:1"><label class="smart-label" id="lbl-lName">VEZETÉKNÉV</label><input type="text" id="in-lastName" oninput="updatePreview()"></div>
    </div>

    <div class="input-group">
        <div style="flex:1"><label class="smart-label" id="lbl-city">VÁROS</label><input type="text" id="in-city" oninput="updatePreview()"></div>
        <div style="flex:1"><label class="smart-label" id="lbl-street">UTCA</label><input type="text" id="in-street" oninput="updatePreview()"></div>
    </div>
    <div class="input-group">
        <div style="flex:1"><label class="smart-label" id="lbl-type">≡ TÍPUS</label>
            <select id="in-street-type" onchange="updatePreview()">
                <option value="utca">utca / street / straße</option>
                <option value="út">út / road / straße</option>
                <option value="tér">tér / square / platz</option>
            </select>
        </div>
        <div style="width:30%"><label class="smart-label">HÁZSZÁM</label><input type="text" id="in-house" oninput="updatePreview()"></div>
    </div>

    <label class="smart-label" id="lbl-phone">TELEFON</label><input type="text" id="in-phone" oninput="updatePreview()">
    <label class="smart-label" id="lbl-email">EMAIL</label><input type="email" id="in-email" oninput="updatePreview()">
    <label class="smart-label" id="lbl-summary">PROFIL-BEMUTATKOZÁS</label><textarea id="in-summary" rows="3" oninput="updatePreview()"></textarea>

    <div id="edu-area"><h3 id="lbl-eduHeader">TANULMÁNYOK</h3><div id="edu-container"></div><button onclick="addEntry('edu')" class="add-btn" id="lbl-addEdu">+ ÚJ ISKOLA</button></div>
    <div id="work-area"><h3 id="lbl-workHeader">MUNKATAPASZTALAT</h3><div id="work-container"></div><button onclick="addEntry('work')" class="add-btn" id="lbl-addWork">+ ÚJ MUNKAHELY</button></div>

    <button onclick="window.print()" class="print-btn" id="lbl-printBtn">PDF GENERÁLÁSA</button>
</div>

<div class="preview-side"><div class="cv-paper" id="cv-paper"><div class="cv-header"><div id="out-photo-box" style="display:none; width:130px; height:160px; overflow:hidden;"><img id="out-photo" style="width:100%;"></div><div class="header-text"><h1 id="out-name">NAME</h1><div id="out-contact" style="margin-top:10px; font-size:14px; color:#555;"></div></div></div><div id="main-content"></div></div></div>

<script>
    // A GIGA-ADATBÁZIS HIVATKOZÁSI ALAPJA
    const careerDB = {
        eduLevels: [
            { hu: "Általános iskola", en: "Primary School", de: "Grundschule" },
            { hu: "Gimnáziumi érettségi", en: "High School Diploma", de: "Abitur" },
            { hu: "Szakközépiskolai érettségi", en: "Vocational High School", de: "Berufliche Oberschule" },
            { hu: "Szakmunkás bizonyítvány", en: "Vocational Certificate", de: "Berufsabschluss" },
            { hu: "Technikusi vizsga", en: "Technical Diploma", de: "Technikerabschluss" },
            { hu: "Főiskolai diploma (BSc)", en: "Bachelor's Degree", de: "Bachelor-Abschluss" },
            { hu: "Egyetemi diploma (MSc)", en: "Master's Degree", de: "Master-Abschluss" },
            { hu: "Szakács szakképesítés", en: "Chef Qualification", de: "Koch Qualifikation" },
            { hu: "Targonca jogosítvány", en: "Forklift License", de: "Staplerschein" }
            // Norbi, ide másold be a többi 40+ elemet a database-ből!
        ],
        jobs: [
            { hu: "Raktáros", en: "Warehouse Worker", de: "Lagerarbeiter" },
            { hu: "Teherautó sofőr", en: "Truck Driver", de: "LKW-Fahrer" },
            { hu: "Eladó / Pénztáros", en: "Sales Assistant", de: "Verkäufer" },
            { hu: "Szakács", en: "Chef", de: "Koch" },
            { hu: "Lakatos", en: "Locksmith", de: "Schlosser" },
            { hu: "Villanyszerelő", en: "Electrician", de: "Elektriker" },
            { hu: "Kőműves", en: "Bricklayer", de: "Maurer" },
            { hu: "Futár", en: "Courier", de: "Kurier" }
            // Norbi, ide jön a többi 40+ szakma!
        ],
        positions: [
            { hu: "Alkalmazott", en: "Employee", de: "Angestellter" },
            { hu: "Műszakvezető", en: "Shift Supervisor", de: "Schichtleiter" },
            { hu: "Csoportvezető", en: "Team Leader", de: "Teamleiter" },
            { hu: "Gyakornok", en: "Intern", de: "Praktikant" }
        ]
    };

    const dictionary = {
        hu: { engineName: "Career-Engine", atsTitle: "🚀 API TIPPEK:", atsTips: "• Kulcsszavak!\n• Számok!\n• Jó fotó!", guideTitle: "📝 ÚTMUTATÓ:", guide: "Profilba írj 3-4 mondatban. Használd a menüket!", fName: "KERESZTNÉV", lName: "VEZETÉKNÉV", city: "VÁROS", street: "UTCA", type: "≡ TÍPUS", phone: "TELEFON", email: "EMAIL", summary: "PROFIL", eduHeader: "TANULMÁNYOK", workHeader: "TAPASZTALAT", addEdu: "+ ÚJ ISKOLA", addWork: "+ ÚJ MUNKAHELY", printBtn: "PDF GENERÁLÁSA", addr: "Cím:", colors: "SZÍNEK", styles: "STÍLUSOK", v_deg: "Végzettség", v_job: "Foglalkozás", v_pos: "Beosztás", v_other: "EGYÉB" },
        en: { engineName: "Career-Engine", atsTitle: "🚀 API TIPS:", atsTips: "• Keywords!\n• Numbers!\n• Pro Photo!", guideTitle: "📝 GUIDE:", guide: "Describe yourself in 3-4 sentences.", fName: "FIRST NAME", lName: "LAST NAME", city: "CITY", street: "STREET", type: "≡ TYPE", phone: "PHONE", email: "EMAIL", summary: "SUMMARY", eduHeader: "EDUCATION", workHeader: "EXPERIENCE", addEdu: "+ ADD SCHOOL", addWork: "+ ADD JOB", printBtn: "GENERATE PDF", addr: "Address:", colors: "COLORS", styles: "STYLES", v_deg: "Degree", v_job: "Occupation", v_pos: "Position", v_other: "OTHER" },
        de: { engineName: "Career-Engine", atsTitle: "🚀 API TIPPS:", atsTips: "• Keywords!\n• Zahlen!\n• Foto!", guideTitle: "📝 ANLEITUNG:", guide: "Schreiben Sie 3-4 Sätze.", fName: "VORNAME", lName: "NACHNAME", city: "STADT", street: "STRASSE", type: "≡ TYP", phone: "TELEFON", email: "EMAIL", summary: "PROFIL", eduHeader: "BILDUNG", workHeader: "ERFAHRUNG", addEdu: "+ SCHULE", addWork: "+ JOB", printBtn: "PDF GENERIEREN", addr: "Adresse:", colors: "FARBEN", styles: "STILE", v_deg: "Abschluss", v_job: "Beruf", v_pos: "Position", v_other: "SONSTIGES" }
    };

    let currentLang = 'hu';

    async function apiTranslate(text) {
        if (!text || currentLang === 'hu') return text;
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=hu|${currentLang}`);
            const data = await res.json();
            return data.responseData.translatedText || text;
        } catch { return text; }
    }

    function setMode(l, btn) {
        currentLang = l;
        document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateInterface();
        updatePreview();
        // KRITIKUS: Frissítsük a már létező legördülő menüket az új nyelvre!
        refreshAllSelects();
    }

    function refreshAllSelects() {
        // Frissíti a Végzettség, Foglalkozás és Beosztás legördülőket minden hozzáadott boxban
        document.querySelectorAll('.entry-box').forEach(box => {
            const isEdu = box.closest('#edu-container');
            const select = box.querySelector('.e-db') || box.querySelector('.e-job') || box.querySelector('.e-pos');
            if (!select) return;

            const currentVal = select.value;
            let list = isEdu ? careerDB.eduLevels : (select.classList.contains('e-job') ? careerDB.jobs : careerDB.positions);
            
            let html = `<option value="other">-- ${dictionary[currentLang].v_other} --</option>`;
            list.forEach(item => {
                html += `<option value="${item.hu}" ${item.hu === currentVal ? 'selected' : ''}>${item[currentLang]}</option>`;
            });
            select.innerHTML = html;
        });
    }

    function updateInterface() {
        const d = dictionary[currentLang];
        for (let key in d) {
            const el = document.getElementById('lbl-' + key);
            if (el) el.innerText = d[key];
        }
        document.querySelectorAll('.dyn-deg').forEach(el => el.innerText = d.v_deg);
        document.querySelectorAll('.dyn-job').forEach(el => el.innerText = d.v_job);
        document.querySelectorAll('.dyn-pos').forEach(el => el.innerText = d.v_pos);
        document.querySelectorAll('.dyn-other').forEach(el => el.innerText = d.v_other);
    }

    function updatePreview() {
        const l = document.getElementById('in-lastName').value || "";
        const f = document.getElementById('in-firstName').value || "";
        // PAPÍR SORREND: HU: Vez+Ker | EN/DE: Ker+Vez
        document.getElementById('out-name').innerText = (currentLang === 'hu' ? l + " " + f : f + " " + l).trim().toUpperCase() || "NAME";
        renderPaper();
    }

    async function renderPaper() {
        const d = dictionary[currentLang];
        const city = await apiTranslate(document.getElementById('in-city').value);
        const street = document.getElementById('in-street').value;
        const sTypeSelect = document.getElementById('in-street-type');
        const sType = sTypeSelect.options[sTypeSelect.selectedIndex].text.split(' / ')[currentLang === 'hu' ? 0 : (currentLang === 'en' ? 1 : 2)];
        
        document.getElementById('out-contact').innerHTML = `
            <div><b>${d.phone}:</b> ${document.getElementById('in-phone').value} | <b>${d.email}:</b> ${document.getElementById('in-email').value}</div>
            <div><b>${d.addr}</b> ${city}, ${street} ${sType} ${document.getElementById('in-house').value}</div>
        `;

        let html = "";
        const sum = document.getElementById('in-summary').value;
        if(sum) html += `<h3>${d.summary}</h3><p>${await apiTranslate(sum)}</p>`;

        // ISKOLA RENDER
        let eduHtml = "";
        for (let box of document.querySelectorAll('#edu-container .entry-box')) {
            const m = box.querySelector('.e-main').value;
            const sub = box.querySelector('.e-sub').value;
            const dbVal = box.querySelector('.e-db').value;
            const other = box.querySelector('.e-other').value;
            let title = (dbVal !== "other") ? careerDB.eduLevels.find(x => x.hu === dbVal)[currentLang] : await apiTranslate(other);
            if(m || title) eduHtml += `<div style="margin-bottom:10px"><b>${m}</b> - ${title} (${sub})</div>`;
        }
        if(eduHtml) html += `<h3>${d.eduHeader}</h3>` + eduHtml;

        // MUNKA RENDER
        let workHtml = "";
        for (let box of document.querySelectorAll('#work-container .entry-box')) {
            const m = box.querySelector('.e-main').value;
            const sub = box.querySelector('.e-sub').value;
            const jobDb = box.querySelector('.e-job').value;
            const jobOther = box.querySelector('.e-job-other').value;
            const posDb = box.querySelector('.e-pos').value;
            const posOther = box.querySelector('.e-pos-other').value;
            let job = (jobDb !== "other") ? careerDB.jobs.find(x => x.hu === jobDb)[currentLang] : await apiTranslate(jobOther);
            let pos = (posDb !== "other") ? careerDB.positions.find(x => x.hu === posDb)[currentLang] : await apiTranslate(posOther);
            if(m || job) workHtml += `<div style="margin-bottom:10px"><b>${m}</b> - ${job} (${pos})<br>${sub}</div>`;
        }
        if(workHtml) html += `<h3>${d.workHeader}</h3>` + workHtml;

        document.getElementById('main-content').innerHTML = html;
    }

    function addEntry(type) {
        const div = document.createElement('div');
        div.className = 'entry-box';
        const d = dictionary[currentLang];
        
        if(type === 'edu') {
            let opts = careerDB.eduLevels.map(x => `<option value="${x.hu}">${x[currentLang]}</option>`).join('');
            div.innerHTML = `
                <input type="text" class="e-main" placeholder="Iskola" oninput="updatePreview()">
                <input type="text" class="e-sub" placeholder="Év" oninput="updatePreview()">
                <label class="smart-label dyn-deg">${d.v_deg}</label>
                <select class="e-db" onchange="updatePreview()"><option value="other">-- ${d.v_other} --</option>${opts}</select>
                <label class="smart-label dyn-other">${d.v_other}</label>
                <input type="text" class="e-other" oninput="updatePreview()">
            `;
        } else {
            let jobOpts = careerDB.jobs.map(x => `<option value="${x.hu}">${x[currentLang]}</option>`).join('');
            let posOpts = careerDB.positions.map(x => `<option value="${x.hu}">${x[currentLang]}</option>`).join('');
            div.innerHTML = `
                <input type="text" class="e-main" placeholder="Munkahely" oninput="updatePreview()">
                <input type="text" class="e-sub" placeholder="Év" oninput="updatePreview()">
                <label class="smart-label dyn-job">${d.v_job}</label>
                <select class="e-job" onchange="updatePreview()"><option value="other">-- ${d.v_other} --</option>${jobOpts}</select>
                <label class="smart-label dyn-other">${d.v_other}</label>
                <input type="text" class="e-job-other" oninput="updatePreview()">
                <label class="smart-label dyn-pos">${d.v_pos}</label>
                <select class="e-pos" onchange="updatePreview()"><option value="other">-- ${d.v_other} --</option>${posOpts}</select>
                <label class="smart-label dyn-other">${d.v_other}</label>
                <input type="text" class="e-pos-other" oninput="updatePreview()">
            `;
        }
        document.getElementById(type + '-container').appendChild(div);
        updateInterface();
    }

    window.onload = () => {
        const colors = ["#007bb5", "#e67e22", "#27ae60", "#c0392b", "#8e44ad", "#1a1a1a", "#f1c40f", "#16a085", "#d35400", "#2c3e50"];
        colors.forEach(c => {
            let b = document.createElement('div'); b.className = 'color-btn'; b.style.background = c;
            b.onclick = () => { document.documentElement.style.setProperty('--main-color', c); updatePreview(); };
            document.getElementById('color-picker').appendChild(b);
        });
        for(let i=1; i<=10; i++) {
            let b = document.createElement('button'); b.className = 'style-btn'; b.innerText = i;
            b.onclick = () => { document.body.className = 'style-' + i; updatePreview(); };
            document.getElementById('style-picker').appendChild(b);
        }
        updateInterface();
    };

    function loadPhoto(e) {
        const r = new FileReader();
        r.onload = () => { document.getElementById('out-photo').src = r.result; document.getElementById('out-photo-box').style.display='block'; };
        r.readAsDataURL(e.target.files[0]);
    }
</script>
</body>
</html>
