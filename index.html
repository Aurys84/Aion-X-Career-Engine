<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Aion-X Dashboard v12.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="style-10">
    <div class="editor-side">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
            <div style="width:45px; height:45px; background:var(--main-color); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">A&N</div>
            <h2 id="lbl-title" style="color:var(--main-color); margin:0; font-size:18px;">AION-X PANEL</h2>
        </div>

        <div class="ats-tips" style="background:#1a3a5a; padding:12px; border-radius:8px; margin-bottom:15px; border-left:4px solid #f1c40f; font-size:11px; color:white;">
            <b style="color:#f1c40f;">🚀 GIGA ATS TIPPEK:</b><br>
            • Használj konkrét szoftverneveket (SAP, Minitab)!<br>
            • Fotó: Világos háttér, profi öltözet.
        </div>
        
        <div class="lang-grid" style="display: flex; gap: 5px; margin-bottom: 20px;">
            <button class="btn-lang active" onclick="setMode('hu', this)">HU</button>
            <button class="btn-lang" onclick="setMode('en', this)">EN</button>
            <button class="btn-lang" onclick="setMode('de', this)">DE</button>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label class="smart-label" id="lbl-style">STÍLUS</label>
                <select id="style-select" onchange="updateStyle()">
                    <option value="style-10">10. Aion-X Speciál</option>
                    <option value="style-1">1. Modern</option>
                    <option value="style-2">2. Klasszikus</option>
                    <option value="style-3">3. Centrált</option>
                    <option value="style-6">6. Kreatív</option>
                </select>
            </div>
            <div style="flex:1"><label class="smart-label" id="lbl-color">SZÍN</label>
                <select id="theme-color" onchange="updateTheme()">
                    <option value="#007bb5">Aion Kék</option>
                    <option value="#e67e22">Narancs</option>
                    <option value="#27ae60">Smaragd</option>
                    <option value="#c0392b">Vörös</option>
                    <option value="#8e44ad">Lila</option>
                    <option value="#2c3e50">Pala</option>
                    <option value="#f1c40f">Arany</option>
                    <option value="#16a085">Türkiz</option>
                    <option value="#e74c3c">Alizarin</option>
                    <option value="#2ecc71">Lomb</option>
                </select>
            </div>
        </div>

        <label class="smart-label" id="lbl-name">NÉV</label>
        <input type="text" id="in-name" placeholder="Vezetéknév Keresztnév" oninput="updatePreview()">

        <label class="smart-label" id="lbl-city">IRSZ / VÁROS / UTCA / HÁZ</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="in-zip" placeholder="IRSZ" oninput="updatePreview()" style="width:30%">
            <input type="text" id="in-city" placeholder="Város" oninput="updatePreview()" style="width:70%">
        </div>
        <div style="display: flex; gap: 5px; margin-top:5px;">
            <input type="text" id="in-street" placeholder="Utca" oninput="updatePreview()" style="width:70%">
            <input type="text" id="in-house" placeholder="Házszám" oninput="updatePreview()" style="width:30%">
        </div>

        <label class="smart-label" id="lbl-phone">TELEFON</label><input type="text" id="in-phone" oninput="updatePreview()">
        <label class="smart-label" id="lbl-email">EMAIL</label><input type="email" id="in-email" oninput="updatePreview()">
        
        <label class="smart-label" id="lbl-edu">TANULMÁNYOK</label><div id="edu-container"></div>
        <button onclick="addEntry('edu')" class="add-btn">+ ÚJ ISKOLA</button>

        <label class="smart-label" id="lbl-work">TAPASZTALAT</label><div id="work-container"></div>
        <button onclick="addEntry('work')" class="add-btn">+ ÚJ MUNKA</button>

        <button onclick="window.print()" style="background:var(--main-color); color:white; padding:15px; width:100%; border:none; margin-top:20px; font-weight:bold; cursor:pointer; border-radius:6px;">PDF GENERÁLÁSA</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header">
                <h1 id="out-name">NAME</h1>
                <div id="out-contact"></div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>
    <script src="dictionary.js"></script><script src="engine.js"></script>
</body>
</html>
