<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Global Control v4.8.0</title>
    <style>
        :root { --main-color: #3498db; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; overflow: hidden; }
        
        .editor-side { width: 35%; background: #1a1a1a; color: #ecf0f1; padding: 25px; overflow-y: auto; border-right: 4px solid var(--main-color); }
        .logo-box { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .logo-icon { width: 40px; height: 40px; border: 3px solid var(--main-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--main-color); font-size: 22px; }
        
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 20px; }
        .btn-lang { padding: 10px; font-size: 11px; cursor: pointer; background: #333; color: #ccc; border: 1px solid #444; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-lang.active { background: var(--main-color); color: white; transform: scale(1.05); }

        .ats-box { background: #2c3e50; border-left: 5px solid #f1c40f; padding: 15px; margin-bottom: 25px; font-size: 11px; }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #3498db; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; font-size: 13px; box-sizing: border-box; }
        
        .job-entry { background: #252525; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid var(--main-color); }
        .add-btn { background: var(--main-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }

        .preview-side { width: 65%; display: flex; justify-content: center; padding: 40px; overflow-y: auto; background: #525659; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 50px; box-shadow: 0 0 30px rgba(0,0,0,0.6); box-sizing: border-box; color: #333; transition: 0.4s ease; }
        
        /* 10 STÍLUS */
        .style-1 .cv-body { display: flex; gap: 40px; } .style-1 .side-col { width: 35%; background: #f9f9f9; padding: 15px; }
        .style-2 .cv-paper { border-top: 30px solid var(--main-color); }
        .style-3 .cv-header { flex-direction: column; text-align: center; }
        .style-4 .cv-paper { font-family: 'Courier New', monospace; }
        .style-5 .cv-header { background: #f4f4f4; border: 2px solid #ddd; padding: 25px; }
        .style-6 .cv-paper { border-left: 55px solid var(--main-color); padding-left: 40px; }
        .style-7 .header-text h1 { font-size: 50px; border-bottom: 8px solid var(--main-color); }
        .style-8 .cv-paper { line-height: 2.2; font-size: 11px; }
        .style-9 #photo-preview { border-radius: 50%; border: 6px solid var(--main-color); width: 130px; height: 130px; }
        .style-10 .cv-paper { border: 20px double var(--main-color); }

        .cv-header { border-bottom: 4px solid var(--main-color); padding-bottom: 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 25px; }
        #photo-preview { width: 140px; height: 180px; object-fit: cover; display: none; }
        .contact-row { margin-bottom: 6px; font-size: 14px; }
        .contact-label { font-weight: bold; color: var(--main-color); margin-right: 10px; }
        h3 { border-bottom: 1px solid #eee; padding-bottom: 8px; color: var(--main-color); text-transform: uppercase; font-size: 16px; margin-top: 30px; }
        
        /* CÉG-ÉV-BEOSZTÁS LAYOUT */
        .job-item { margin-bottom: 20px; }
        .job-company { font-weight: bold; font-size: 16px; display: block; }
        .job-year { font-style: italic; color: #7f8c8d; font-size: 13px; display: block; margin: 2px 0; }
        .job-pos { font-weight: 600; font-size: 14px; color: var(--main-color); text-transform: uppercase; display: block; }

        @media print { .editor-side { display: none; } .preview-side { width: 100%; padding: 0; background: white; } .cv-paper { box-shadow: none; margin: 0; } }
    </style>
</head>
<body class="style-1">

    <div class="editor-side">
        <div class="logo-box"><div class="logo-icon">X</div><h1 style="color:#3498db; font-size:24px; margin:0;">Career Engine</h1></div>
        
        <div class="ats-box"><strong id="ats-title" style="color:#f1c40f;">ATS STRATEGY BOARD</strong><div id="ats-tips"></div></div>

        <label>NYELVI MÓD (Hybrid Keresztfordítás):</label>
        <div class="lang-grid">
            <button class="btn-lang active" onclick="setMode('hu', this)">Magyar</button>
            <button class="btn-lang" onclick="setMode('en-mix', this)">HU+EN Mix</button>
            <button class="btn-lang" onclick="setMode('de-mix', this)">HU+DE Mix</button>
            <button class="btn-lang" onclick="setMode('en-only', this)">Only EN</button>
            <button class="btn-lang" onclick="setMode('de-only', this)">Only DE</button>
        </div>

        <div class="control-group"><label id="lbl-style">Stílus Választó</label><select id="style-select" onchange="updateStyle()"></select></div>
        <div class="control-group"><label id="lbl-theme">Rendszer Szín</label><select id="theme-color" onchange="updateTheme()"></select></div>
        
        <div class="control-group"><label id="lbl-name">Full Name</label><input type="text" id="in-name" oninput="updatePreview()"></div>
        <div style="display: flex; gap: 8px;">
            <div class="control-group" style="flex: 1;"><label id="lbl-zip">ZIP</label><input type="text" id="in-zip" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 2;"><label id="lbl-city">City</label><input type="text" id="in-city" oninput="updatePreview()"></div>
        </div>
        <div style="display: flex; gap: 8px;">
            <div class="control-group" style="flex: 2;"><label id="lbl-street">Street</label><input type="text" id="in-street" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 1;"><label id="lbl-house">No.</label><input type="text" id="in-house" oninput="updatePreview()"></div>
        </div>
        
        <div class="control-group"><label id="lbl-phone">Phone</label><input type="text" id="in-phone" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-email">Email</label><input type="text" id="in-email" oninput="updatePreview()"></div>

        <h4 id="lbl-work-h" style="color:var(--main-color); margin-top:20px;">EXPERIENCE</h4>
        <div id="job-container"></div>
        <button class="add-btn" onclick="addJob()" id="btn-add-job">+ ADD WORKPLACE</button>

        <div class="control-group"><label id="lbl-summary">Summary</label><textarea id="in-summary" rows="2" oninput="updatePreview()"></textarea></div>
        <div class="control-group"><label id="lbl-skills">Skills</label><textarea id="in-skills" rows="3" oninput="updatePreview()"></textarea></div>
        <div class="control-group"><label id="lbl-license">License</label><input type="text" id="in-license" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-hobby">Hobbies</label><input type="text" id="in-hobby" oninput="updatePreview()"></div>

        <button onclick="window.print()" id="btn-print" style="background:#27ae60; color:white; padding:20px; width:100%; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:15px;">PRINT FINAL PDF</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header" id="cv-header">
                <div class="header-text"><h1 id="out-name" style="margin:0; font-size: 32px;">NAME</h1><div class="contact-info" id="out-contact"></div></div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>

    <script>
        const omniDict = [
            { hu: "vagyonőr", en: "Security Guard", de: "Sicherheitskraft" },
            { hu: "ügyletvezető", en: "Business Manager", de: "Geschäftsführer" },
            { hu: "precíz", en: "precise", de: "präzise" },
            { hu: "pontos", en: "accurate", de: "genau" },
            { hu: "középfok", en: "intermediate", de: "Mittelstufe" },
            { hu: "utca", en: "street", de: "straße" },
            { hu: "jogosítvány", en: "driving license", de: "Führerschein" },
            { hu: "B kategória", en: "Category B", de: "Klasse B" },
            { hu: "zenehallgatás", en: "listening to music", de: "Musik hören" }
        ];

        const dictionary = {
            hu: { name:"Név", zip:"Irsz.", city:"Város", street:"Utca", house:"Házszám", phone:"Tel", email:"Email", summary:"Bemutatkozás", work:"Munkahelyek", skills:"Készségek", license:"Jogosítvány", hobby:"Hobbi", add:"+ Hozzáad", print:"PDF MENTÉS", tips:["Tiszta szöveg.","Kulcsszavak.","PDF mentés."], styles:["Modern Oszlopos", "Klasszikus", "Centrált", "Minimalista", "Technikai", "Kreatív", "Menedzseri", "Akadémiai", "Junior", "Aion-X Speciál"], colors:["Aion Kék", "Narancs", "Mélyfekete", "Smaragd", "Vörös", "Lila", "Arany", "Ezüst", "Türkiz", "Pala"] },
            en: { name:"Name", zip:"ZIP", city:"City", street:"Street", house:"No.", phone:"Phone", email:"Email", summary:"Summary", work:"Experience", skills:"Skills", license:"License", hobby:"Hobbies", add:"+ Add Job", print:"SAVE PDF", tips:["Clean text.","Keywords.","PDF save."], styles:["Modern Column", "Classic", "Centered", "Minimalist", "Technical", "Creative", "Managerial", "Academic", "Junior", "Aion-X Special"], colors:["Aion Blue", "Orange", "Black", "Emerald", "Red", "Purple", "Gold", "Silver", "Turquoise", "Slate"] },
            de: { name:"Name", zip:"PLZ", city:"Stadt", street:"Straße", house:"Hausnr.", phone:"Tel.", email:"Email", summary:"Profil", work:"Erfahrung", skills:"Kenntnisse", license:"Führerschein", hobby:"Hobby", add:"+ Job", print:"PDF SPEICHERN", tips:["Klarer Text.","Keywords.","PDF-Format."], styles:["Modern Spalte", "Klassisch", "Zentriert", "Minimalistisch", "Technisch", "Kreativ", "Management", "Akademisch", "Junior", "Aion-X Spezial"], colors:["Aion Blau", "Orange", "Schwarz", "Smaragd", "Rot", "Lila", "Gold", "Silber", "Türkis", "Schiefer"] }
        };

        const colorValues = ["#3498db", "#e67e22", "#1a1a1a", "#27ae60", "#c0392b", "#8e44ad", "#f1c40f", "#bdc3c7", "#1abc9c", "#34495e"];
        let currentMode = 'hu', jobCount = 0;

        function setMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updatePreview();
        }

        function omniTranslate(text, force) {
            if (!text || currentMode === 'hu' || (currentMode.includes('mix') && !force)) return text;
            let targetLang = currentMode.split('-')[0], res = text;
            omniDict.forEach(entry => {
                for (let key in entry) {
                    let reg = new RegExp(entry[key], "gi");
                    if (text.match(reg)) { res = res.replace(reg, entry[targetLang]); break; }
                }
            });
            return res;
        }

        function addJob() {
            jobCount++;
            const div = document.createElement('div'); div.className = 'job-entry';
            div.innerHTML = `<input type="text" placeholder="Cég" class="j-c" oninput="updatePreview()"><input type="text" placeholder="Év" class="j-y" style="margin:5px 0" oninput="updatePreview()"><input type="text" placeholder="Beosztás" class="j-p" oninput="updatePreview()">`;
            document.getElementById('job-container').appendChild(div);
        }

        function updatePreview() {
            let lang = currentMode === 'hu' ? 'hu' : currentMode.split('-')[0], force = currentMode.includes('only');
            ['name','zip','city','street','house','phone','email','summary','skills','license','hobby'].forEach(f => { document.getElementById('lbl-'+f).innerText = dictionary[lang][f]; });
            document.getElementById('btn-add-job').innerText = dictionary[lang].add;
            document.getElementById('btn-print').innerText = dictionary[lang].print;
            document.getElementById('lbl-work-h').innerText = dictionary[lang].work;
            document.getElementById('ats-tips').innerHTML = dictionary[lang].tips.map(t => `<p>${t}</p>`).join("");

            const n = document.getElementById('in-name').value;
            document.getElementById('out-name').innerText = (force && n.includes(" ")) ? n.split(" ").reverse().join(" ") : n || "NAME";

            const z = document.getElementById('in-zip').value, c = omniTranslate(document.getElementById('in-city').value, force), s = omniTranslate(document.getElementById('in-street').value, force), h = document.getElementById('in-house').value;
            let addr = force ? `${z} ${c}, ${s} ${h}` : `${c}, ${s} ${h}, ${z}`;
            document.getElementById('out-contact').innerHTML = `<b>${dictionary[lang].name}:</b> ${addr}`;

            let mainHtml = "";
            const sum = omniTranslate(document.getElementById('in-summary').value, force);
            if(sum) mainHtml += `<p><i>${sum}</i></p>`;

            let jH = "";
            document.querySelectorAll('.job-entry').forEach(e => {
                const comp = e.querySelector('.j-c').value, y = e.querySelector('.j-y').value, p = omniTranslate(e.querySelector('.j-p').value, force);
                if(comp || p) jH += `<div class="job-item"><span class="job-company">${comp}</span><span class="job-year">${y}</span><span class="job-pos">${p}</span></div>`;
            });
            if(jH) mainHtml += `<h3>${dictionary[lang].work}</h3>` + jH;

            ['skills', 'license', 'hobby'].forEach(k => {
                const val = omniTranslate(document.getElementById('in-' + k).value, force);
                if(val) mainHtml += `<h3>${dictionary[lang][k]}</h3><div style="white-space:pre-wrap;">${val}</div>`;
            });
            document.getElementById('main-content').innerHTML = mainHtml;
        }

        function updateStyle() { document.body.className = document.getElementById('style-select').value; }
        function updateTheme() { document.documentElement.style.setProperty('--main-color', document.getElementById('theme-color').value); }

        window.onload = () => { 
            const styleS = document.getElementById('style-select');
            dictionary.hu.styles.forEach((s, i) => { let o = document.createElement('option'); o.value="style-"+(i+1); o.innerText=s; styleS.appendChild(o); });
            const colorS = document.getElementById('theme-color');
            dictionary.hu.colors.forEach((c, i) => { let o = document.createElement('option'); o.value=colorValues[i]; o.innerText=c; colorS.appendChild(o); });
            updatePreview(); 
        };
    </script>
</body>
</html>
