<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion Mátrix - Profi Önéletrajz v7.1</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #ecf0f1; padding: 20px; margin: 0; }
        .container { max-width: 800px; background: #2c2c2c; padding: 35px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin: auto; border: 1px solid #444; }
        h2 { color: #007bb5; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        
        .smart-label { font-weight: bold; font-size: 13px; color: #007bb5; display: block; margin-top: 20px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .smart-label span { color: #888; font-weight: normal; font-size: 11px; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #444; background: #1a1a1a; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #007bb5; outline: none; box-shadow: 0 0 8px rgba(0,123,181,0.5); }

        .lang-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .btn-lang { padding: 12px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; background: #444; transition: 0.3s; }
        .btn-lang.active { background: #007bb5; transform: scale(0.95); box-shadow: 0 0 15px rgba(0,123,181,0.5); }
        
        .dynamic-entry { background: #252525; padding: 15px; border: 1px dashed #555; border-radius: 8px; margin-bottom: 15px; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 20px; transition: 0.3s; }
        .btn-add:hover { background: #2ecc71; }

        .gen-btn { width: 100%; padding: 20px; background: #007bb5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #kep-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid #007bb5; }
        
        .ats-info { background: #1e3799; padding: 15px; border-radius: 6px; font-size: 12px; line-height: 1.4; border-left: 5px solid #007bb5; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Aion Mátrix - Career Engine v7.1</h2>

        <div class="ats-info">
            <strong>🚀 INTEL:</strong> A felület 3 nyelven segít, de a papír csak a választott célnyelven generálódik!
        </div>

        <label class="smart-label">Profilkép <span>(Profile Photo / Profilbild)</span></label>
        <input type="file" id="kep-input" accept="image/*" onchange="previewKep()">
        <img id="kep-preview">

        <label class="smart-label">Célnyelv választása <span>(Select Target Language / Zielsprache wählen)</span></label>
        <div class="lang-grid">
            <button class="btn-lang active" onclick="setMode('hu', this)">Magyar (HU)</button>
            <button class="btn-lang" onclick="setMode('en', this)">English (EN)</button>
            <button class="btn-lang" onclick="setMode('de', this)">Deutsch (DE)</button>
        </div>
        
        <label class="smart-label">Dizájn Szín <span>(Design Color / Designfarbe)</span></label>
        <select id="szinvalaszto">
            <option value="#007bb5">Aion Kék</option>
            <option value="#1a3a5a">Midnight Blue</option>
            <option value="#2ecc71">Emerald Green</option>
            <option value="#e67e22">Norbi Orange</option>
            <option value="#b33939">Ruby Red</option>
            <option value="#2c3e50">Slate Gray</option>
        </select>

        <label class="smart-label">Személyes adatok <span>(Personal Data / Persönliche Daten)</span></label>
        <input type="text" id="nev" placeholder="Teljes Név / Full Name / Name">
        <input type="text" id="cim" placeholder="Város, Utca, Házszám / Address / Adresse">
        <input type="text" id="tel" placeholder="Telefonszám / Phone / Telefon">
        <input type="email" id="email" placeholder="E-mail cím">

        <label class="smart-label">Bemutatkozás <span>(Profile Summary / Über mich)</span></label>
        <textarea id="bemutat" placeholder="Írj pár sort magadról... (Summary...)" rows="3"></textarea>

        <label class="smart-label">Tanulmányok <span>(Education / Ausbildung)</span></label>
        <div id="edu-list"></div>
        <button class="btn-add" id="btn-add-edu" onclick="addEntry('edu')">+ ISKOLA HOZZÁADÁSA (ADD EDU)</button>

        <label class="smart-label">Tapasztalat <span>(Experience / Erfahrung)</span></label>
        <div id="work-list"></div>
        <button class="btn-add" id="btn-add-work" onclick="addEntry('work')">+ MUNKAHELY HOZZÁADÁSA (ADD JOB)</button>

        <label class="smart-label">Készségek <span>(Skills / Fähigkeiten)</span></label>
        <input type="text" id="kesz" placeholder="Szoftverek, nyelvek, készségek... (Skills...)">

        <button class="gen-btn" onclick="generalas()">GENERÁLÁS ÉS NYOMTATÁS</button>
    </div>

    <script src="dictionary.js"></script>
    <script src="engine.js"></script>
</body>
</html>
