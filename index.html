<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career-Engine v36.2</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="style-10">
    <div class="editor-side">
        <div class="logo-area">
            <div class="brand-circle">A&N</div>
            <h1 id="lbl-engineName">Career-Engine</h1>
        </div>

        <div class="info-panel" id="ats-tips-box">
            <b id="lbl-atsTitle">GIGA ATS TIPPEK:</b>
            <div id="lbl-atsContent"></div>
        </div>

        <div class="info-panel guide">
            <b id="lbl-guideTitle">KITÖLTÉSI ÚTMUTATÓ:</b>
            <p id="lbl-guideText"></p>
        </div>

        <div class="lang-grid">
            <button class="btn-lang active" onclick="setMode('hu', this)">HU</button>
            <button class="btn-lang" onclick="setMode('en', this)">EN</button>
            <button class="btn-lang" onclick="setMode('de', this)">DE</button>
        </div>

        <div class="control-row">
            <div class="picker-box">
                <label class="smart-label" id="lbl-colorLabel">SZÍNEK (10)</label>
                <div class="color-grid" id="color-picker"></div>
            </div>
            <div class="picker-box">
                <label class="smart-label" id="lbl-styleLabel">STÍLUSOK (10)</label>
                <div class="style-grid" id="style-picker"></div>
            </div>
        </div>

        <label class="smart-label" id="lbl-photo">FOTÓ FELTÖLTÉSE</label>
        <input type="file" id="in-photo" accept="image/*" onchange="loadPhoto(event)">

        <div class="input-group">
            <div style="flex:1"><label class="smart-label" id="lbl-lName">VEZETÉKNÉV</label><input type="text" id="in-lastName" oninput="updatePreview()"></div>
            <div style="flex:1"><label class="smart-label" id="lbl-fName">KERESZTNÉV</label><input type="text" id="in-firstName" oninput="updatePreview()"></div>
        </div>

        <div class="input-group">
            <div style="flex:1"><label class="smart-label" id="lbl-cityLabel">VÁROS</label><input type="text" id="in-city" oninput="updatePreview()"></div>
            <div style="flex:1"><label class="smart-label" id="lbl-streetLabel">UTCANÉV</label><input type="text" id="in-street" oninput="updatePreview()"></div>
        </div>

        <div class="input-group">
            <div style="flex:1">
                <label class="smart-label" id="lbl-type">≡ TÍPUS</label>
                <select id="in-street-type" onchange="updatePreview()">
                    <option value="utca">utca / street / straße</option>
                    <option value="út">út / road / straße</option>
                    <option value="tér">tér / square / platz</option>
                </select>
            </div>
            <div style="width:30%"><label class="smart-label">NO.</label><input type="text" id="in-house" oninput="updatePreview()"></div>
        </div>

        <label class="smart-label" id="lbl-phoneLabel">TELEFON</label><input type="text" id="in-phone" oninput="updatePreview()">
        <label class="smart-label" id="lbl-emailLabel">EMAIL</label><input type="email" id="in-email" oninput="updatePreview()">
        
        <label class="smart-label" id="lbl-summaryLabel">PROFIL / BEMUTATKOZÁS (API FORDÍTÓVAL)</label>
        <textarea id="in-summary" rows="3" oninput="updatePreview()"></textarea>

        <div id="edu-area">
            <h3 id="lbl-eduTitle">TANULMÁNYOK</h3>
            <div id="edu-container"></div>
            <button onclick="addEntry('edu')" class="add-btn" id="lbl-addEdu">+ ÚJ ISKOLA</button>
        </div>

        <div id="work-area">
            <h3 id="lbl-workTitle">MUNKATAPASZTALAT</h3>
            <div id="work-container"></div>
            <button onclick="addEntry('work')" class="add-btn" id="lbl-addWork">+ ÚJ MUNKAHELY</button>
        </div>

        <button onclick="window.print()" class="print-btn" id="lbl-print">PDF GENERÁLÁSA</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header">
                <div id="out-photo-box" style="display:none;"><img id="out-photo"></div>
                <div class="header-text"><h1 id="out-name">NAME</h1><div id="out-contact"></div></div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="dictionary.js"></script>
    <script src="engine.js"></script>
</body>
</html>
