<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Global Control v1.4.0</title>
    <style>
        :root { --main-color: #3498db; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        
        /* Editor Panel */
        .editor-side { width: 35%; background: #1a1a1a; color: #ecf0f1; padding: 25px; overflow-y: auto; border-right: 4px solid var(--main-color); }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #3498db; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .lang-btns { display: flex; gap: 4px; margin-bottom: 10px; }
        .lang-btns button { flex: 1; padding: 8px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #ccc; font-weight: bold; }
        .active-lang { background: var(--main-color) !important; color: white !important; }
        .print-btn { background: #27ae60; color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Preview Side */
        .preview-side { width: 65%; display: flex; justify-content: center; padding: 30px; overflow-y: auto; background: #525659; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; color: #333; transition: all 0.3s; }
        
        /* Dinamikus Stílusok */
        .layout-modern .cv-body { display: flex; gap: 30px; }
        .layout-modern .side-col { width: 35%; background: #f9f9f9; padding: 15px; border-radius: 4px; }
        .layout-classic .cv-body { display: block; }
        .layout-classic .side-col { width: 100%; margin-top: 20px; border-top: 1px solid #eee; }

        .cv-header { border-bottom: 3px solid var(--main-color); padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
        #photo-preview { width: 120px; height: 150px; object-fit: cover; border: 1px solid #ddd; display: none; }
        .contact-info { font-size: 12px; color: #666; margin-top: 5px; }
        h3 { border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--main-color); text-transform: uppercase; font-size: 14px; margin-top: 20px; }
        .content-block { white-space: pre-wrap; font-size: 13px; line-height: 1.6; margin-top: 5px; }

        @media print {
            .editor-side { display: none; }
            .preview-side { width: 100%; padding: 0; background: white; }
            .cv-paper { box-shadow: none; width: 100%; margin: 0; }
        }
    </style>
</head>
<body class="layout-modern">

    <div class="editor-side">
        <h1 style="color: #3498db; font-size: 20px;">Global Control</h1>
        
        <div class="control-group">
            <label id="lbl-lang">Language</label>
            <div class="lang-btns">
                <button id="btn-hu" onclick="changeLang('hu')">HU</button>
                <button id="btn-en" onclick="changeLang('en')">EN</button>
                <button id="btn-de" onclick="changeLang('de')">DE</button>
            </div>
        </div>

        <div class="control-group">
            <label id="lbl-style">Layout Style</label>
            <select id="layout-select" onchange="updateLayout()">
                <option value="layout-modern">Modern (2 Column)</option>
                <option value="layout-classic">Classic (Standard)</option>
            </select>
        </div>

        <div class="control-group">
            <label id="lbl-theme">Theme Color</label>
            <select id="theme-color" onchange="updateTheme()"></select>
        </div>

        <div class="control-group">
            <label id="lbl-photo">Professional Photo</label>
            <input type="file" accept="image/*" onchange="loadPhoto(event)">
        </div>

        <div class="control-group">
            <label id="lbl-name">Full Name</label>
            <input type="text" id="in-name" oninput="updatePreview()">
        </div>

        <div class="control-group">
            <label id="lbl-phone">Phone</label>
            <input type="text" id="in-phone" oninput="updatePreview()">
        </div>
        <div class="control-group">
            <label id="lbl-email">Email</label>
            <input type="text" id="in-email" oninput="updatePreview()">
        </div>
        <div class="control-group">
            <label id="lbl-address">Address</label>
            <input type="text" id="in-address" oninput="updatePreview()">
        </div>

        <div class="control-group">
            <label id="lbl-summary">Summary</label>
            <textarea id="in-summary" rows="2" oninput="updatePreview()"></textarea>
        </div>

        <div class="control-group">
            <label id="lbl-exp">Experience</label>
            <textarea id="in-exp" rows="4" oninput="updatePreview()"></textarea>
        </div>

        <button class="print-btn" onclick="window.print()" id="btn-print">PRINT PDF</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-target">
            <div class="cv-header" id="cv-header">
                <img id="photo-preview" src="">
                <div>
                    <h1 id="out-name" style="margin:0;">Name</h1>
                    <div class="contact-info" id="out-contact"></div>
                </div>
            </div>
            <div class="cv-body">
                <div class="main-col">
                    <p id="out-summary" style="font-style:italic; margin-bottom:15px;"></p>
                    <div id="main-content"></div>
                </div>
                <div class="side-col" id="side-content"></div>
            </div>
        </div>
    </div>

    <script>
        const dictionary = {
            hu: { 
                lang: "Nyelv", style: "Elrendezés", theme: "Rendszer Szín", name: "Teljes Név", phone: "Telefonszám", 
                email: "E-mail cím", address: "Lakcím", summary: "Bemutatkozás", exp: "Tapasztalat", print: "MENTÉS PDF-KÉNT",
                layouts: ["Modern (2 oszlopos)", "Klasszikus (Sima)"],
                colors: ["Aion Kék", "Norbi Narancs", "Mélyfekete", "Smaragd", "Vörös", "Lila", "Arany", "Ezüst", "Türkiz", "Pala"]
            },
            en: { 
                lang: "Language", style: "Layout", theme: "System Color", name: "Full Name", phone: "Phone Number", 
                email: "Email Address", address: "Home Address", summary: "Summary", exp: "Experience", print: "SAVE TO PDF",
                layouts: ["Modern (2 columns)", "Classic (Standard)"],
                colors: ["Aion Blue", "Norbi Orange", "Deep Black", "Emerald", "Red", "Purple", "Gold", "Silver", "Turquoise", "Slate"]
            },
            de: { 
                lang: "Sprache", style: "Layout", theme: "Systemfarbe", name: "Vollständiger Name", phone: "Telefonnummer", 
                email: "E-Mail-Adresse", address: "Adresse", summary: "Kurzprofil", exp: "Berufserfahrung", print: "ALS PDF SPEICHERN",
                layouts: ["Modern (2 Spalten)", "Klassisch (Standard)"],
                colors: ["Aion Blau", "Norbi Orange", "Tiefschwarz", "Smaragd", "Rot", "Lila", "Gold", "Silber", "Türkis", "Schiefer"]
            }
        };

        const colorValues = ["#3498db", "#e67e22", "#1a1a1a", "#27ae60", "#c0392b", "#8e44ad", "#f1c40f", "#bdc3c7", "#1abc9c", "#34495e"];
        let currentLang = 'hu';

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btns button').forEach(btn => btn.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            
            const fields = ['lang', 'style', 'theme', 'name', 'phone', 'email', 'address', 'summary', 'exp'];
            fields.forEach(f => document.getElementById('lbl-' + f).innerText = dictionary[lang][f]);
            document.getElementById('btn-print').innerText = dictionary[lang].print;

            const styleSelect = document.getElementById('layout-select');
            Array.from(styleSelect.options).forEach((opt, i) => opt.innerText = dictionary[lang].layouts[i]);

            const colorSelect = document.getElementById('theme-color');
            colorSelect.innerHTML = "";
            dictionary[lang].colors.forEach((c, i) => {
                let o = document.createElement('option'); o.value = colorValues[i]; o.innerText = c;
                colorSelect.appendChild(o);
            });
            updatePreview();
        }

        function updateLayout() {
            const layout = document.getElementById('layout-select').value;
            document.body.className = layout;
        }

        function loadPhoto(e) {
            const img = document.getElementById('photo-preview');
            img.src = URL.createObjectURL(e.target.files[0]);
            img.style.display = "block";
        }

        function updateTheme() {
            const c = document.getElementById('theme-color').value;
            document.documentElement.style.setProperty('--main-color', c);
            document.getElementById('out-name').style.color = c;
            document.getElementById('cv-header').style.borderColor = c;
        }

        function updatePreview() {
            document.getElementById('out-name').innerText = document.getElementById('in-name').value || dictionary[currentLang].name;
            
            const phone = document.getElementById('in-phone').value;
            const email = document.getElementById('in-email').value;
            const address = document.getElementById('in-address').value;
            
            // Sorrend és ikonok nélkül, tisztán, fordítva
            let contactHtml = "";
            if(phone) contactHtml += `<span>${phone}</span> | `;
            if(email) contactHtml += `<span>${email}</span> | `;
            if(address) contactHtml += `<span>${address}</span>`;
            document.getElementById('out-contact').innerHTML = contactHtml;

            document.getElementById('out-summary').innerText = document.getElementById('in-summary').value;
            document.getElementById('main-content').innerHTML = `<h3>${dictionary[currentLang].exp}</h3><div class="content-block">${document.getElementById('in-exp').value}</div>`;
        }

        window.onload = () => { changeLang('hu'); updateTheme(); };
    </script>
</body>
</html>
