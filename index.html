<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Aion-X Dashboard v7.9</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="editor-side">
        <div class="logo-box" style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
            <div style="width:40px; height:40px; background:var(--main-color); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">A&N</div>
            <h2 style="color:var(--main-color); margin:0;">AION-X CONTROL PANEL</h2>
        </div>
        
        <div class="lang-grid" style="display: flex; gap: 5px; margin-bottom: 20px;">
            <button class="btn-lang active" onclick="setMode('hu', this)">HU</button>
            <button class="btn-lang" onclick="setMode('en', this)">EN</button>
            <button class="btn-lang" onclick="setMode('de', this)">DE</button>
        </div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <div style="flex:1">
                <label class="smart-label">Stílus / Style / Stil</label>
                <select id="style-select" onchange="updateStyle()">
                    <option value="style-10">Aion-X Speciál</option>
                    <option value="style-1">Modern</option>
                    <option value="style-2">Klasszikus</option>
                </select>
            </div>
            <div style="flex:1">
                <label class="smart-label">Szín / Color</label>
                <input type="color" id="theme-color" value="#007bb5" oninput="updateTheme()" style="height:40px; width:100%; border:none; cursor:pointer;">
            </div>
        </div>

        <label class="smart-label">Fénykép / Photo / Foto</label>
        <input type="file" id="in-photo" accept="image/*" onchange="loadPhoto(event)">

        <label class="smart-label">Név / Name / Name</label>
        <input type="text" id="in-name" placeholder="Teljes Név" oninput="updatePreview()">

        <label class="smart-label">Elérhetőség / Contact / Kontakt</label>
        <input type="text" id="in-phone" placeholder="Telefon" oninput="updatePreview()">
        <input type="email" id="in-email" placeholder="Email" oninput="updatePreview()">

        <label class="smart-label">Helyszín / Location / Ort</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="in-zip" placeholder="Irsz." oninput="updatePreview()" style="width:30%">
            <input type="text" id="in-city" placeholder="Város" oninput="updatePreview()" style="width:70%">
        </div>
        <input type="text" id="in-street" placeholder="Utca, házszám" oninput="updatePreview()">

        <label class="smart-label">Jogosítvány / License / Führerschein</label>
        <input type="text" id="in-license" placeholder="B kategória..." oninput="updatePreview()">

        <label class="smart-label">Tanulmányok / Education / Ausbildung</label>
        <div id="edu-container"></div>
        <button onclick="addEntry('edu')" style="background:#2ecc71; color:white; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;">+ ÚJ ISKOLA</button>

        <label class="smart-label">Tapasztalat / Experience / Erfahrung</label>
        <div id="work-container"></div>
        <button onclick="addEntry('work')" style="background:#2ecc71; color:white; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;">+ ÚJ MUNKAHELY</button>

        <label class="smart-label">Készségek / Skills / Kenntnisse</label>
        <textarea id="in-skills" rows="2" oninput="updatePreview()"></textarea>

        <button onclick="window.print()" class="gen-btn" style="width:100%; padding:15px; background:var(--main-color); color:white; border:none; border-radius:5px; margin-top:20px; font-weight:bold; cursor:pointer;">NYOMTATÁS (PDF)</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div style="position:absolute; bottom:10px; right:10px; opacity:0.1; font-weight:bold;">AION-X MATRIXLB</div>
            <div class="cv-header" style="display:flex; gap:20px; align-items:flex-start;">
                <div id="out-photo-box" style="display:none; width:120px; height:150px; border:1px solid #ccc; overflow:hidden;">
                    <img id="out-photo" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="header-text">
                    <h1 id="out-name">NAME</h1>
                    <div id="out-contact" style="font-size:12px; margin-top:10px;"></div>
                </div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>

    <script src="dictionary.js"></script>
    <script src="engine.js"></script>
</body>
</html>
