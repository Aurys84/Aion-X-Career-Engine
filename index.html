<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Career Engine v1.1.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="editor-side">
        <h1 style="color: #3498db; font-size: 24px;">Aion-X Global Control</h1>
        
        <div class="control-group">
            <label>Language / Sprache</label>
            <div class="lang-btns">
                <button id="btn-hu" onclick="changeLang('hu')">HU</button>
                <button id="btn-en" onclick="changeLang('en')">EN</button>
                <button id="btn-de" onclick="changeLang('de')">DE</button>
            </div>
        </div>

        <div class="control-group">
            <label>Mátrix Design (Szín)</label>
            <select id="theme-color" onchange="updateTheme()">
                <option value="#3498db">Aion Kék</option>
                <option value="#e67e22">Norbi Narancs</option>
                <option value="#2ecc71">Smaragd</option>
                <option value="#e74c3c">Vörös</option>
                <option value="#9b59b6">Lila</option>
                <option value="#1abc9c">Türkiz</option>
            </select>
        </div>

        <div class="control-group">
            <label id="lbl-name">Full Name</label>
            <input type="text" id="in-name" oninput="updatePreview()">
        </div>

        <div class="control-group">
            <label id="lbl-summary">Professional Summary</label>
            <textarea id="in-summary" rows="5" oninput="updatePreview()"></textarea>
        </div>
    </div>

    <div class="preview-side">
        <div class="cv-paper">
            <h1 id="out-name">Name</h1>
            <hr id="line" style="border: 2px solid #3498db; margin: 15px 0;">
            <p id="out-summary">Summary will appear here...</p>
        </div>
    </div>

    <script src="dictionary.js"></script>
    <script src="engine.js"></script>
</body>
</html>
