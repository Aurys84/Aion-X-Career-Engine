<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aion-X Career Engine v6.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="editor-side">
        <div class="logo-box"><div class="logo-icon">X</div><h1>Career Engine</h1></div>
        <div class="lang-grid">
            <button class="btn-lang active" onclick="setMode('hu', this)">HU</button>
            <button class="btn-lang" onclick="setMode('en', this)">EN</button>
            <button class="btn-lang" onclick="setMode('de', this)">DE</button>
        </div>
        <div class="control-group"><label id="lbl-name">Name</label><input type="text" id="in-name" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-phone">Phone</label><input type="text" id="in-phone" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-email">Email</label><input type="text" id="in-email" oninput="updatePreview()"></div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="in-zip" placeholder="ZIP" oninput="updatePreview()">
            <input type="text" id="in-city" placeholder="City" oninput="updatePreview()">
        </div>
        <div style="display: flex; gap: 8px; margin-top: 5px;">
            <input type="text" id="in-street" placeholder="Street" oninput="updatePreview()">
            <input type="text" id="in-house" placeholder="No." oninput="updatePreview()">
        </div>

        <h4 id="lbl-edu-h">EDUCATION</h4>
        <div id="edu-container"></div>
        <button class="add-btn" onclick="addEntry('edu')">+ EDUCATION</button>

        <h4 id="lbl-work-h">EXPERIENCE</h4>
        <div id="work-container"></div>
        <button class="add-btn" onclick="addEntry('work')">+ WORKPLACE</button>

        <textarea id="in-summary" placeholder="Summary" oninput="updatePreview()"></textarea>
        <textarea id="in-skills" placeholder="Skills" oninput="updatePreview()"></textarea>
        <input type="text" id="in-license" placeholder="License" oninput="updatePreview()">
        <input type="text" id="in-hobby" placeholder="Hobbies" oninput="updatePreview()">
        
        <button onclick="window.print()" class="print-btn">PRINT PDF</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header">
                <div class="header-text">
                    <h1 id="out-name">NAME</h1>
                    <div id="out-contact" class="contact-info"></div>
                </div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>

    <script src="dictionary.js"></script>
    <script src="engine.js"></script>
</body>
</html>
