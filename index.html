<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Career-Engine v42.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="style-10">
    <div class="editor-side">
        <div class="logo-area"><div class="brand-circle">A&N</div><h1 id="lbl-engineName">Career-Engine</h1></div>

        <div class="info-panel"><b id="lbl-atsTitle"></b><div id="lbl-atsTips" style="white-space: pre-wrap;"></div></div>
        <div class="info-panel guide"><b id="lbl-guideTitle"></b><p id="lbl-guide"></p></div>

        <div class="lang-grid">
            <button class="btn-lang active" onclick="setMode('hu', this)">HU</button>
            <button class="btn-lang" onclick="setMode('en', this)">EN</button>
            <button class="btn-lang" onclick="setMode('de', this)">DE</button>
        </div>
        <div class="picker-row"><label class="smart-label" id="lbl-colorLabel">SZÍNEK</label><div class="color-grid" id="color-picker"></div></div>
        <div class="picker-row"><label class="smart-label" id="lbl-styleLabel">STÍLUSOK</label><div class="style-grid" id="style-picker"></div></div>

        <label class="smart-label" id="lbl-photoLabel">FOTÓ</label>
        <input type="file" onchange="loadPhoto(event)">

        <div class="input-group">
            <div style="flex:1"><label class="smart-label" id="lbl-fName">KERESZTNÉV</label><input type="text" id="in-firstName" oninput="updatePreview()"></div>
            <div style="flex:1"><label class="smart-label" id="lbl-lName">VEZETÉKNÉV</label><input type="text" id="in-lastName" oninput="updatePreview()"></div>
        </div>

        <div class="input-group">
            <div style="flex:1"><label class="smart-label" id="lbl-cityLabel">VÁROS</label><input type="text" id="in-city" oninput="updatePreview()"></div>
            <div style="flex:1"><label class="smart-label" id="lbl-streetLabel">UTCA</label><input type="text" id="in-street" oninput="updatePreview()"></div>
        </div>
        <div class="input-group">
            <div style="flex:1">
                <label class="smart-label" id="lbl-typeLabel">TÍPUS</label>
                <select id="in-street-type" onchange="updatePreview()">
                    <option value="utca">utca / street / straße</option>
                    <option value="út">út / road / straße</option>
                    <option value="tér">tér / square / platz</option>
                </select>
            </div>
            <div style="width:30%"><label class="smart-label">HÁZSZÁM</label><input type="text" id="in-house" oninput="updatePreview()"></div>
        </div>

        <label class="smart-label" id="lbl-phoneLabel">TELEFON</label><input type="text" id="in-phone" oninput="updatePreview()">
        <label class="smart-label" id="lbl-emailLabel">EMAIL</label><input type="email" id="in-email" oninput="updatePreview()">
        
        <label class="smart-label" id="lbl-summaryLabel">PROFIL / BEMUTATKOZÁS</label>
        <textarea id="in-summary" rows="3" oninput="updatePreview()"></textarea>

        <div id="edu-area">
            <h3 id="lbl-eduHeader">TANULMÁNYOK</h3>
            <div id="edu-container"></div>
            <button onclick="addEntry('edu')" class="add-btn">+ ÚJ ISKOLA</button>
        </div>

        <div id="work-area">
            <h3 id="lbl-workHeader">MUNKATAPASZTALAT</h3>
            <div id="work-container"></div>
            <button onclick="addEntry('work')" class="add-btn">+ ÚJ MUNKAHELY</button>
        </div>

        <button onclick="window.print()" class="print-btn" id="lbl-printBtn">PDF GENERÁLÁSA</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header">
                <div id="out-photo-box" style="display:none; width:120px; height:150px; overflow:hidden;"><img id="out-photo" style="width:100%;"></div>
                <div class="header-text"><h1 id="out-name">NAME</h1><div id="out-contact"></div></div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>
    <script src="database.js"></script><script src="dictionary.js"></script><script src="engine.js"></script>
</body>
</html>
