<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Global Control v2.9.0</title>
    <style>
        :root { --main-color: #3498db; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        
        /* EDITOR PANEL */
        .editor-side { width: 35%; background: #1a1a1a; color: #ecf0f1; padding: 25px; overflow-y: auto; border-right: 4px solid var(--main-color); }
        .logo-box { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .logo-icon { width: 40px; height: 40px; border: 3px solid var(--main-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--main-color); font-size: 22px; }
        
        .ats-box { background: #2c3e50; border-left: 5px solid #f1c40f; padding: 15px; margin-bottom: 25px; font-size: 12px; border-radius: 0 4px 4px 0; }
        .ats-box p { margin: 5px 0; color: #bdc3c7; line-height: 1.4; }

        .control-group { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #3498db; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; font-size: 13px; box-sizing: border-box; }
        
        .lang-btns { display: flex; gap: 5px; margin-bottom: 20px; }
        .lang-btns button { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 5px; background: #333; color: #ccc; font-weight: bold; transition: 0.3s; }
        .active-lang { background: var(--main-color) !important; color: white !important; transform: scale(1.05); }
        
        .print-btn { background: #27ae60; color: white; padding: 18px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }

        /* PREVIEW PANEL */
        .preview-side { width: 65%; display: flex; justify-content: center; padding: 40px; overflow-y: auto; background: #525659; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 50px; box-shadow: 0 0 30px rgba(0,0,0,0.6); box-sizing: border-box; color: #333; transition: 0.4s ease; }
        
        /* 10 STÍLUS - MOST MÁR DRASZTIKUS VÁLTÁSOKKAL */
        .style-1 .cv-body { display: flex; gap: 40px; } .style-1 .side-col { width: 35%; background: #f9f9f9; padding: 20px; }
        .style-2 .cv-paper { border-top: 30px solid var(--main-color); border-bottom: 10px solid #eee; }
        .style-3 .cv-header { flex-direction: column; text-align: center; border-bottom: 1px solid #eee; }
        .style-4 .cv-paper { font-family: 'Courier New', Courier, monospace; letter-spacing: -0.5px; }
        .style-5 .cv-header { background: #f4f4f4; border: 2px solid #ddd; padding: 30px; }
        .style-6 .cv-paper { border-left: 55px solid var(--main-color); padding-left: 40px; }
        .style-7 .header-text h1 { font-size: 55px; border-bottom: 10px solid var(--main-color); line-height: 0.9; }
        .style-8 .cv-paper { line-height: 2.2; font-size: 11px; background: #fdfdfd; }
        .style-9 #photo-preview { border-radius: 50%; border: 6px solid var(--main-color); width: 150px; height: 150px; }
        .style-10 .cv-paper { border: 20px double var(--main-color); background: #fbfbfb; }

        .cv-header { border-bottom: 4px solid var(--main-color); padding-bottom: 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 25px; }
        #photo-preview { width: 140px; height: 170px; object-fit: cover; border: 1px solid #ddd; display: none; }
        .contact-row { margin-bottom: 5px; font-size: 14px; }
        .contact-label { font-weight: bold; color: var(--main-color); margin-right: 8px; }
        h3 { border-bottom: 1px solid #eee; padding-bottom: 8px; color: var(--main-color); text-transform: uppercase; font-size: 16px; margin-top: 30px; }

        @media print { .editor-side { display: none; } .preview-side { width: 100%; padding: 0; background: white; } .cv-paper { box-shadow: none; margin: 0; width: 100%; } }
    </style>
</head>
<body class="style-1">

    <div class="editor-side">
        <div class="logo-box">
            <div class="logo-icon">X</div>
            <h1 style="color: #3498db; font-size: 24px; margin: 0; letter-spacing: 1px;">Global Control</h1>
        </div>
        
        <div class="ats-box">
            <strong id="ats-title" style="color: #f1c40f; font-size: 14px;">ATS STRATEGY BOARD</strong>
            <div id="ats-tips"></div>
        </div>

        <div class="control-group">
            <label id="lbl-lang">Select Operating Language</label>
            <div class="lang-btns">
                <button id="btn-hu" onclick="changeLang('hu')">HU</button>
                <button id="btn-en" onclick="changeLang('en')">EN</button>
                <button id="btn-de" onclick="changeLang('de')">DE</button>
            </div>
        </div>

        <div class="control-group"><label id="lbl-style">Interface Style</label><select id="style-select" onchange="updateStyle()"></select></div>
        <div class="control-group"><label id="lbl-theme">System Color Theme</label><select id="theme-color" onchange="updateTheme()"></select></div>
        <div class="control-group"><label id="lbl-photo">Professional Photo</label><input type="file" accept="image/*" onchange="loadPhoto(event)"></div>
        
        <div class="control-group"><label id="lbl-name">Full Name</label><input type="text" id="in-name" oninput="updatePreview()"></div>
        
        <div style="display: flex; gap: 8px;">
            <div class="control-group" style="flex: 1;"><label id="lbl-zip">ZIP Code</label><input type="text" id="in-zip" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 2;"><label id="lbl-city">City</label><input type="text" id="in-city" oninput="updatePreview()"></div>
        </div>
        <div style="display: flex; gap: 8px;">
            <div class="control-group" style="flex: 2;"><label id="lbl-street">Street Name</label><input type="text" id="in-street" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 1;"><label id="lbl-house">House No.</label><input type="text" id="in-house" oninput="updatePreview()"></div>
        </div>
        
        <div class="control-group"><label id="lbl-phone">Phone Number</label><input type="text" id="in-phone" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-email">E-mail Address</label><input type="text" id="in-email" oninput="updatePreview()"></div>
        
        <div class="control-group"><label id="lbl-summary">Professional Summary</label><textarea id="in-summary" rows="3" oninput="updatePreview()"></textarea></div>
        <div class="control-group"><label id="lbl-exp">Work Experience</label><textarea id="in-exp" rows="4" oninput="updatePreview()"></textarea></div>
        <div class="control-group"><label id="lbl-skills">Core Skills</label><input type="text" id="in-skills" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-langs">Languages Known</label><input type="text" id="in-langs" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-license">Driving License</label><input type="text" id="in-license" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-hobby">Hobbies & Interests</label><input type="text" id="in-hobby" oninput="updatePreview()"></div>

        <button class="print-btn" onclick="window.print()" id="btn-print">GENERATE FINAL PDF</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header" id="cv-header">
                <img id="photo-preview" src="">
                <div class="header-text">
                    <h1 id="out-name" style="margin:0; font-size: 32px;">YOUR NAME</h1>
                    <div class="contact-info" id="out-contact"></div>
                </div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>

    <script>
        // KI TERJESZTETT KERESZTBE-FORDÍTÓ SZÓTÁR
        const crossDict = {
            "Csapatban dolgozom": { en: "Team player", de: "Teamfähig" },
            "Fejlesztés": { en: "Development", de: "Entwicklung" },
            "Angol -Német A2": { en: "English-German A2", de: "Englisch-Deutsch A2" },
            "B kategória": { en: "Category B", de: "Klasse B" },
            "utca": { en: "street", de: "straße" },
            "Meggyeskovácsi": { en: "Meggyeskovácsi", de: "Meggyeskovácsi" },
            "Szakmai tapasztalat": { en: "Work Experience", de: "Berufserfahrung" },
            "Szombathely": { en: "Szombathely", de: "Szombathely" }
        };

        const dictionary = {
            hu: { lang: "Nyelvválasztás", style: "Stílus (10 típus)", theme: "Rendszer Szín (10)", name: "Teljes Név", zip: "Irsz.", city: "Város", street: "Utca", house: "Házszám", phone: "Telefon", email: "E-mail", summary: "Bemutatkozás", exp: "Tapasztalat", skills: "Készségek", langs: "Nyelvek", license: "Jogosítvány", hobby: "Hobbi", print: "PDF MENTÉS", photo: "Fotó", tips: ["1. Tiszta szöveg.", "2. Kulcsszavak.", "3. PDF mentés.", "4. Üres mezők elrejtve."], labels: { p: "Tel:", e: "Email:", a: "Cím:" }, styles: ["Modern Oszlopos", "Klasszikus", "Centrált", "Minimalista", "Technikai", "Kreatív", "Menedzseri", "Akadémiai", "Junior", "Aion-X Speciál"], colors: ["Aion Kék", "Narancs", "Fekete", "Smaragd", "Vörös", "Lila", "Arany", "Ezüst", "Türkiz", "Pala"] },
            en: { lang: "Language", style: "Style (10 Types)", theme: "System Color (10)", name: "Full Name", zip: "ZIP", city: "City", street: "Street", house: "No.", phone: "Phone", email: "Email", summary: "Summary", exp: "Experience", skills: "Skills", langs: "Languages", license: "License", hobby: "Hobbies", print: "SAVE PDF", photo: "Photo", tips: ["1. Clean text.", "2. Keywords.", "3. PDF save.", "4. Empty fields hidden."], labels: { p: "Phone:", e: "Email:", a: "Address:" }, styles: ["Modern Column", "Classic", "Centered", "Minimalist", "Technical", "Creative", "Managerial", "Academic", "Junior", "Aion-X Special"], colors: ["Aion Blue", "Orange", "Black", "Emerald", "Red", "Purple", "Gold", "Silver", "Turquoise", "Slate"] },
            de: { lang: "Sprache", style: "Layout (10)", theme: "Farbe (10)", name: "Name", zip: "PLZ", city: "Stadt", street: "Straße", house: "Hausnr.", phone: "Tel.", email: "Email", summary: "Profil", exp: "Erfahrung", skills: "Kenntnisse", langs: "Sprachen", license: "Führerschein", hobby: "Hobbys", print: "PDF SPEICHERN", photo: "Foto", tips: ["1. Klarer Text.", "2. Keywords.", "3. PDF-Format.", "4. Felder ausgeblendet."], labels: { p: "Tel:", e: "Email:", a: "Adresse:" }, styles: ["Modern Spalte", "Klassisch", "Zentriert", "Minimal", "Technisch", "Kreativ", "Management", "Akademisch", "Junior", "Aion-X Spezial"], colors: ["Aion Blau", "Orange", "Schwarz", "Smaragd", "Rot", "Lila", "Gold", "Silber", "Türkis", "Schiefer"] }
        };

        const colorValues = ["#3498db", "#e67e22", "#1a1a1a", "#27ae60", "#c0392b", "#8e44ad", "#f1c40f", "#bdc3c7", "#1abc9c", "#34495e"];
        let currentLang = 'hu';

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btns button').forEach(b => b.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            
            const fields = ['lang', 'style', 'theme', 'photo', 'name', 'zip', 'city', 'street', 'house', 'phone', 'email', 'summary', 'exp', 'skills', 'langs', 'license', 'hobby'];
            fields.forEach(f => { document.getElementById('lbl-' + f).innerText = dictionary[lang][f]; });
            document.getElementById('ats-tips').innerHTML = dictionary[lang].tips.map(t => `<p>${t}</p>`).join("");
            document.getElementById('btn-print').innerText = dictionary[lang].print;

            const styleS = document.getElementById('style-select'); styleS.innerHTML = "";
            dictionary[lang].styles.forEach((s, i) => { let o = document.createElement('option'); o.value = "style-"+(i+1); o.innerText = s; styleS.appendChild(o); });
            const colorS = document.getElementById('theme-color'); colorS.innerHTML = "";
            dictionary[lang].colors.forEach((c, i) => { let o = document.createElement('option'); o.value = colorValues[i]; o.innerText = c; colorS.appendChild(o); });

            updatePreview();
        }

        function crossTranslate(text) {
            if (!text || currentLang === 'hu') return text;
            let res = text;
            for (let key in crossDict) {
                let reg = new RegExp(key, "gi");
                if (text.match(reg)) res = res.replace(reg, crossDict[key][currentLang]);
            }
            return res;
        }

        function flipName(name, lang) {
            if (!name) return "";
            let p = name.trim().split(" ");
            if (p.length >= 2 && lang !== 'hu') return p[p.length-1] + " " + p.slice(0, -1).join(" ");
            return name;
        }

        function updatePreview() {
            const n = document.getElementById('in-name').value;
            document.getElementById('out-name').innerText = flipName(n, currentLang) || dictionary[currentLang].name;
            
            const z = document.getElementById('in-zip').value;
            const c = crossTranslate(document.getElementById('in-city').value);
            const s = crossTranslate(document.getElementById('in-street').value);
            const h = document.getElementById('in-house').value;
            let addr = (currentLang !== 'hu') ? `${z} ${c}, ${s} ${h}` : `${c}, ${s} ${h}, ${z}`;

            const lbl = dictionary[currentLang].labels;
            document.getElementById('out-contact').innerHTML = `
                <div class="contact-row"><span class="contact-label">${lbl.p}</span> ${document.getElementById('in-phone').value}</div>
                <div class="contact-row"><span class="contact-label">${lbl.e}</span> ${document.getElementById('in-email').value}</div>
                <div class="contact-row"><span class="contact-label">${lbl.a}</span> ${addr}</div>`;

            let main = "";
            ['summary', 'exp', 'skills', 'langs', 'license', 'hobby'].forEach(k => {
                const val = crossTranslate(document.getElementById('in-' + k).value);
                if(val) main += k==='summary' ? `<p style="font-style:italic; margin-bottom:20px; color:#555;">${val}</p>` : `<h3>${dictionary[currentLang][k]}</h3><div style="white-space:pre-wrap; font-size:14px;">${val}</div>`;
            });
            document.getElementById('main-content').innerHTML = main;
        }

        function updateStyle() { document.body.className = document.getElementById('style-select').value; }
        function loadPhoto(e) { const img = document.getElementById('photo-preview'); img.src = URL.createObjectURL(e.target.files[0]); img.style.display = "block"; }
        function updateTheme() { const c = document.getElementById('theme-color').value; document.documentElement.style.setProperty('--main-color', c); document.getElementById('out-name').style.color = c; document.getElementById('cv-header').style.borderColor = c; }
        window.onload = () => { changeLang('hu'); };
    </script>
</body>
</html>
