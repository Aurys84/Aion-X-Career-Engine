<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Career Engine v1.1.0</title>
    <style>
        /* A nindzsa-osztott képernyő alapjai */
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Bal oldal: A vezérlőpult */
        .editor-side { width: 40%; background: #2c3e50; color: white; padding: 20px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.3); }
        
        /* Jobb oldal: Az élő előnézet */
        .preview-side { width: 60%; background: #f4f4f4; display: flex; justify-content: center; align-items: flex-start; padding: 40px; overflow-y: auto; }
        
        .cv-paper { width: 210mm; min-height: 297mm; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: scale(0.85); transform-origin: top; padding: 40px; box-sizing: border-box; }

        h2 { border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; }
    </style>
</head>
<body>

    <div class="editor-side">
        <h2>Aion-X Control Panel</h2>
        <p>Global Career Engine 1.1.0 (HU/EN/DE)</p>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="live-preview">
            <h1 id="p-name">Your Name</h1>
            <p id="p-summary">Professional summary will appear here...</p>
        </div>
    </div>

</body>
</html>
