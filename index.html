<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Global Control v1.9.0</title>
    <style>
        :root { --main-color: #3498db; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .editor-side { width: 35%; background: #1a1a1a; color: #ecf0f1; padding: 25px; overflow-y: auto; border-right: 4px solid var(--main-color); }
        .control-group { margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #3498db; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .lang-btns { display: flex; gap: 4px; margin-bottom: 15px; }
        .lang-btns button { flex: 1; padding: 8px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #ccc; font-weight: bold; }
        .active-lang { background: var(--main-color) !important; color: white !important; }
        .ats-box { background: #2c3e50; border-left: 4px solid #f1c40f; padding: 12px; margin-bottom: 20px; font-size: 12px; }
        .print-btn { background: #27ae60; color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .preview-side { width: 65%; display: flex; justify-content: center; padding: 30px; overflow-y: auto; background: #525659; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; color: #333; transition: 0.3s; }
        
        /* Layout Stílusok */
        .style-1 .cv-body { display: flex; gap: 30px; } .style-1 .side-col { width: 35%; background: #f9f9f9; padding: 15px; }
        .style-2 .cv-paper { border-top: 20px solid var(--main-color); }
        .style-3 .cv-header { flex-direction: column; text-align: center; }

        .cv-header { border-bottom: 3px solid var(--main-color); padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
        #photo-preview { width: 130px; height: 150px; object-fit: cover; border: 1px solid #ddd; display: none; }
        .contact-info { font-size: 13px; color: #666; margin-top: 5px; }
        h3 { border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--main-color); text-transform: uppercase; font-size: 14px; margin-top: 25px; }
        
        @media print { .editor-side { display: none; } .preview-side { width: 100%; padding: 0; background: white; } .cv-paper { box-shadow: none; margin: 0; } }
    </style>
</head>
<body class="style-1">

    <div class="editor-side">
        <h1 style="color: #3498db; font-size: 22px;">Global Control</h1>
        
        <div class="ats-box">
            <strong id="ats-title" style="color: #f1c40f;">ATS TIPP:</strong>
            <p id="ats-text"></p>
        </div>

        <div class="control-group">
            <label id="lbl-lang">Language Selection</label>
            <div class="lang-btns">
                <button id="btn-hu" onclick="changeLang('hu')">HU</button>
                <button id="btn-en" onclick="changeLang('en')">EN</button>
                <button id="btn-de" onclick="changeLang('de')">DE</button>
            </div>
        </div>

        <div class="control-group"><label id="lbl-style">Style</label><select id="style-select" onchange="updateStyle()"></select></div>
        <div class="control-group"><label id="lbl-theme">Color</label><select id="theme-color" onchange="updateTheme()"></select></div>
        <div class="control-group"><label id="lbl-photo">Photo</label><input type="file" accept="image/*" onchange="loadPhoto(event)"></div>
        <div class="control-group"><label id="lbl-name">Full Name</label><input type="text" id="in-name" oninput="updatePreview()"></div>
        
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 1;"><label id="lbl-zip">ZIP</label><input type="text" id="in-zip" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 2;"><label id="lbl-city">City</label><input type="text" id="in-city" oninput="updatePreview()"></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 2;"><label id="lbl-street">Street</label><input type="text" id="in-street" oninput="updatePreview()"></div>
            <div class="control-group" style="flex: 1;"><label id="lbl-house">No.</label><input type="text" id="in-house" oninput="updatePreview()"></div>
        </div>
        <div class="control-group"><label id="lbl-phone">Phone</label><input type="text" id="in-phone" oninput="updatePreview()"></div>
        <div class="control-group"><label id="lbl-email">Email</label><input type="text" id="in-email" oninput="updatePreview()"></div>

        <div class="control-group"><label id="lbl-summary">Summary</label><textarea id="in-summary" rows="2" oninput="updatePreview()"></textarea></div>
        <div class="control-group"><label id="lbl-exp">Experience</label><textarea id="in-exp" rows="4" oninput="updatePreview()"></textarea></div>

        <button class="print-btn" onclick="window.print()" id="btn-print">GENERATE PDF</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header" id="cv-header">
                <img id="photo-preview" src="">
                <div class="header-text">
                    <h1 id="out-name" style="margin:0;">Name</h1>
                    <div class="contact-info" id="out-contact"></div>
                </div>
            </div>
            <div class="cv-body">
                <div class="main-col">
                    <p id="out-summary" style="font-style:italic; margin-bottom:15px; color: #555;"></p>
                    <div id="main-content"></div>
                </div>
                <div class="side-col" id="side-content"></div>
            </div>
        </div>
    </div>

    <script>
        const dictionary = {
            hu: { 
                lang: "Nyelv", style: "Stílus", theme: "Szín", name: "Teljes Név", zip: "Irsz.", city: "Város", street: "Utca", house: "Házszám",
                phone: "Telefon", email: "Email", summary: "Bemutatkozás", exp: "Tapasztalat", print: "PDF MENTÉS", photo: "Fotó",
                atsTitle: "ATS TIPP:", atsText: "A robotok a tiszta szöveget szeretik.",
                styles: ["Modern", "Klasszikus", "Centrált", "Minimalista", "Technikai", "Kreatív", "Menedzser", "Akadémiai", "Junior", "Aion-X"],
                colors: ["Aion Kék", "Norbi Narancs", "Mélyfekete", "Smaragd", "Vörös", "Lila", "Arany", "Ezüst", "Türkiz", "Pala"]
            },
            en: { 
                lang: "Language", style: "Style", theme: "Color", name: "Full Name", zip: "ZIP", city: "City", street: "Street", house: "House No.",
                phone: "Phone", email: "Email", summary: "Summary", exp: "Experience", print: "SAVE PDF", photo: "Photo",
                atsTitle: "ATS TIP:", atsText: "Robots love plain text.",
                styles: ["Modern", "Classic", "Centered", "Minimalist", "Technical", "Creative", "Manager", "Academic", "Junior", "Aion-X"],
                colors: ["Aion Blue", "Norbi Orange", "Deep Black", "Emerald", "Red", "Purple", "Gold", "Silver", "Turquoise", "Slate"]
            },
            de: { 
                lang: "Sprache", style: "Stil", theme: "Farbe", name: "Vollständiger Name", zip: "PLZ", city: "Stadt", street: "Straße", house: "Hausnr.",
                phone: "Telefon", email: "Email", summary: "Kurzprofil", exp: "Erfahrung", print: "PDF SPEICHERN", photo: "Foto",
                atsTitle: "ATS TIPP:", atsText: "Roboter lieben Text.",
                styles: ["Modern", "Klassisch", "Zentriert", "Minimalistisch", "Technisch", "Kreativ", "Management", "Akademisch", "Junior", "Aion-X Spezial"],
                colors: ["Aion Blau", "Norbi Orange", "Tiefschwarz", "Smaragd", "Rot", "Lila", "Gold", "Silber", "Türkis", "Schiefer"]
            }
        };

        const colorValues = ["#3498db", "#e67e22", "#1a1a1a", "#27ae60", "#c0392b", "#8e44ad", "#f1c40f", "#95a5a6", "#1abc9c", "#34495e"];
        let currentLang = 'hu';

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btns button').forEach(btn => btn.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            
            const fields = ['lang', 'style', 'theme', 'photo', 'name', 'zip', 'city', 'street', 'house', 'phone', 'email', 'summary', 'exp'];
            fields.forEach(f => {
                const el = document.getElementById('lbl-' + f);
                if(el) el.innerText = dictionary[lang][f];
            });

            document.getElementById('btn-print').innerText = dictionary[lang].print;
            document.getElementById('ats-title').innerText = dictionary[lang].atsTitle;
            document.getElementById('ats-text').innerText = dictionary[lang].atsText;

            const styleSelect = document.getElementById('style-select');
            styleSelect.innerHTML = "";
            dictionary[lang].styles.forEach((s, i) => {
                let o = document.createElement('option'); o.value = "style-" + (i+1); o.innerText = s;
                styleSelect.appendChild(o);
            });

            const colorSelect = document.getElementById('theme-color');
            colorSelect.innerHTML = "";
            dictionary[lang].colors.forEach((c, i) => {
                let o = document.createElement('option'); o.value = colorValues[i]; o.innerText = c;
                colorSelect.appendChild(o);
            });

            updatePreview();
        }

        function updateStyle() { document.body.className = document.getElementById('style-select').value; }
        function loadPhoto(e) { const img = document.getElementById('photo-preview'); img.src = URL.createObjectURL(e.target.files[0]); img.style.display = "block"; }
        function updateTheme() { 
            const c = document.getElementById('theme-color').value;
            document.documentElement.style.setProperty('--main-color', c);
            document.getElementById('out-name').style.color = c;
            document.getElementById('cv-header').style.borderColor = c;
        }

        function updatePreview() {
            document.getElementById('out-name').innerText = document.getElementById('in-name').value || dictionary[currentLang].name;
            
            const zip = document.getElementById('in-zip').value;
            const city = document.getElementById('in-city').value;
            const street = document.getElementById('in-street').value;
            const house = document.getElementById('in-house').value;
            const phone = document.getElementById('in-phone').value;
            const email = document.getElementById('in-email').value;

            // SMART ADDRESSING: Fordítja a sorrendet a nyelvnek megfelelően!
            let addressHtml = "";
            if (currentLang === 'de' || currentLang === 'en') {
                // Nemzetközi: 1234 City, Street 5.
                if(zip || city) addressHtml += `<span>${zip} ${city}</span>`;
                if(street || house) addressHtml += `, <span>${street} ${house}</span>`;
            } else {
                // Magyar: Város, utca hsz, irsz.
                if(city) addressHtml += `<span>${city}</span>`;
                if(street || house) addressHtml += `, <span>${street} ${house}</span>`;
                if(zip) addressHtml += `, <span>${zip}</span>`;
            }
            
            let contactHtml = addressHtml;
            if(phone) contactHtml += ` | <span>${phone}</span>`;
            if(email) contactHtml += ` | <span>${email}</span>`;
            
            document.getElementById('out-contact').innerHTML = contactHtml;
            document.getElementById('out-summary').innerText = document.getElementById('in-summary').value;
            document.getElementById('main-content').innerHTML = `<h3>${dictionary[currentLang].exp}</h3><div style="white-space: pre-wrap;">${document.getElementById('in-exp').value}</div>`;
        }

        window.onload = () => { changeLang('hu'); updateTheme(); };
    </script>
</body>
</html>
