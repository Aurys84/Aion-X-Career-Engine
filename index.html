<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion-X Global Control v2.0.0</title>
    <style>
        :root { --main-color: #3498db; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .editor-side { width: 35%; background: #1a1a1a; color: #ecf0f1; padding: 25px; overflow-y: auto; border-right: 4px solid var(--main-color); }
        .control-group { margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #3498db; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .lang-btns { display: flex; gap: 4px; margin-bottom: 15px; }
        .lang-btns button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #ccc; font-weight: bold; transition: 0.3s; }
        .active-lang { background: var(--main-color) !important; color: white !important; transform: scale(1.05); }
        .ats-box { background: #2c3e50; border-left: 4px solid #f1c40f; padding: 12px; margin-bottom: 20px; font-size: 12px; }
        .print-btn { background: #27ae60; color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .preview-side { width: 65%; display: flex; justify-content: center; padding: 30px; overflow-y: auto; background: #525659; }
        .cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; color: #333; }
        
        .cv-header { border-bottom: 3px solid var(--main-color); padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
        #photo-preview { width: 130px; height: 150px; object-fit: cover; border: 1px solid #ddd; display: none; }
        .contact-info { font-size: 13px; color: #666; margin-top: 5px; }
        h3 { border-bottom: 1px solid #eee; padding-bottom: 5px; color: var(--main-color); text-transform: uppercase; font-size: 14px; margin-top: 25px; }
        
        @media print { .editor-side { display: none; } .preview-side { width: 100%; padding: 0; background: white; } .cv-paper { box-shadow: none; margin: 0; } }
    </style>
</head>
<body>

    <div class="editor-side">
        <h1 style="color: #3498db; font-size: 22px;">Global Control</h1>
        
        <div class="ats-box">
            <strong id="ats-title" style="color: #f1c40f;">ATS TIPP:</strong>
            <p id="ats-text"></p>
        </div>

        <div class="control-group">
            <label id="lbl-lang">Language / Fordítás</label>
            <div class="lang-btns">
                <button id="btn-hu" onclick="changeLang('hu')">HU</button>
                <button id="btn-en" onclick="changeLang('en')">EN</button>
                <button id="btn-de" onclick="changeLang('de')">DE</button>
            </div>
        </div>

        <div class="control-group"><label id="lbl-style">Style</label><select id="style-select" onchange="updateStyle()"></select></div>
        <div class="control-group"><label id="lbl-theme">Color</label><select id="theme-color" onchange="updateTheme()"></select></div>
        <div class="control-group"><label id="lbl-photo">Photo</label><input type="file" accept="image/*" onchange="loadPhoto(event)"></div>
        
        <div class="control-group"><label id="lbl-name">Name</label><input type="text" id="in-name" oninput="saveAndPreview()"></div>
        
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 1;"><label id="lbl-zip">ZIP</label><input type="text" id="in-zip" oninput="saveAndPreview()"></div>
            <div class="control-group" style="flex: 2;"><label id="lbl-city">City</label><input type="text" id="in-city" oninput="saveAndPreview()"></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="control-group" style="flex: 2;"><label id="lbl-street">Street</label><input type="text" id="in-street" oninput="saveAndPreview()"></div>
            <div class="control-group" style="flex: 1;"><label id="lbl-house">No.</label><input type="text" id="in-house" oninput="saveAndPreview()"></div>
        </div>
        
        <div class="control-group"><label id="lbl-phone">Phone</label><input type="text" id="in-phone" oninput="saveAndPreview()"></div>
        <div class="control-group"><label id="lbl-email">Email</label><input type="text" id="in-email" oninput="saveAndPreview()"></div>

        <div class="control-group"><label id="lbl-summary">Summary</label><textarea id="in-summary" rows="2" oninput="saveAndPreview()"></textarea></div>
        <div class="control-group"><label id="lbl-exp">Experience</label><textarea id="in-exp" rows="4" oninput="saveAndPreview()"></textarea></div>

        <button class="print-btn" onclick="window.print()" id="btn-print">GENERATE PDF</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header" id="cv-header">
                <img id="photo-preview" src="">
                <div class="header-text">
                    <h1 id="out-name" style="margin:0;">Name</h1>
                    <div class="contact-info" id="out-contact"></div>
                </div>
            </div>
            <div class="cv-body"><div class="main-col"><p id="out-summary" style="font-style:italic; margin-bottom:15px; color:#555;"></p><div id="main-content"></div></div></div>
        </div>
    </div>

    <script>
        // NYELVENKÉNTI ADATTÁROLÁS (Ebbe mentjük, amit beírsz!)
        let userData = {
            hu: { name: "", zip: "", city: "", street: "", house: "", phone: "", email: "", summary: "", exp: "" },
            en: { name: "", zip: "", city: "", street: "", house: "", phone: "", email: "", summary: "", exp: "" },
            de: { name: "", zip: "", city: "", street: "", house: "", phone: "", email: "", summary: "", exp: "" }
        };

        const dictionary = {
            hu: { lang: "Nyelv", style: "Stílus", theme: "Szín", name: "Teljes Név", zip: "Irsz.", city: "Város", street: "Utca", house: "Házszám", phone: "Telefon", email: "Email", summary: "Profil", exp: "Tapasztalat", print: "PDF MENTÉS", photo: "Fotó", atsTitle: "ATS TIPP:", atsText: "Robot-biztos formátum.", styles: ["Modern", "Klasszikus", "Centrált"], colors: ["Aion Kék", "Norbi Narancs", "Fekete"] },
            en: { lang: "Language", style: "Style", theme: "Color", name: "Full Name", zip: "ZIP", city: "City", street: "Street", house: "House No.", phone: "Phone", email: "Email", summary: "Summary", exp: "Experience", print: "SAVE PDF", photo: "Photo", atsTitle: "ATS TIP:", atsText: "Robot-compliant format.", styles: ["Modern", "Classic", "Centered"], colors: ["Aion Blue", "Norbi Orange", "Black"] },
            de: { lang: "Sprache", style: "Stil", theme: "Farbe", name: "Vollständiger Name", zip: "PLZ", city: "Stadt", street: "Straße", house: "Hausnr.", phone: "Telefon", email: "Email", summary: "Kurzprofil", exp: "Erfahrung", print: "PDF SPEICHERN", photo: "Foto", atsTitle: "ATS TIPP:", atsText: "ATS-freundlich.", styles: ["Modern", "Klassisch", "Zentriert"], colors: ["Aion Blau", "Norbi Orange", "Schwarz"] }
        };

        const colorValues = ["#3498db", "#e67e22", "#1a1a1a"];
        let currentLang = 'hu';

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btns button').forEach(btn => btn.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            
            // 1. Feliratok fordítása
            const fields = ['lang', 'style', 'theme', 'photo', 'name', 'zip', 'city', 'street', 'house', 'phone', 'email', 'summary', 'exp'];
            fields.forEach(f => { document.getElementById('lbl-' + f).innerText = dictionary[lang][f]; });
            document.getElementById('ats-title').innerText = dictionary[lang].atsTitle;
            document.getElementById('ats-text').innerText = dictionary[lang].atsText;

            // 2. ADATOK BETÖLTÉSE A MEMÓRIÁBÓL (Itt történik a csoda!)
            fields.slice(4).forEach(f => {
                document.getElementById('in-' + f).value = userData[lang][f];
            });

            // 3. Listák frissítése
            const styleS = document.getElementById('style-select'); styleS.innerHTML = "";
            dictionary[lang].styles.forEach((s, i) => { let o = document.createElement('option'); o.value = "style-"+(i+1); o.innerText = s; styleS.appendChild(o); });
            const colorS = document.getElementById('theme-color'); colorS.innerHTML = "";
            dictionary[lang].colors.forEach((c, i) => { let o = document.createElement('option'); o.value = colorValues[i]; o.innerText = c; colorS.appendChild(o); });

            updatePreview();
        }

        function saveAndPreview() {
            // Adat mentése a jelenlegi nyelvhez
            const fields = ['name', 'zip', 'city', 'street', 'house', 'phone', 'email', 'summary', 'exp'];
            fields.forEach(f => { userData[currentLang][f] = document.getElementById('in-' + f).value; });
            updatePreview();
        }

        function updateStyle() { document.body.className = document.getElementById('style-select').value; }
        function loadPhoto(e) { const img = document.getElementById('photo-preview'); img.src = URL.createObjectURL(e.target.files[0]); img.style.display = "block"; }
        function updateTheme() { const c = document.getElementById('theme-color').value; document.documentElement.style.setProperty('--main-color', c); document.getElementById('out-name').style.color = c; document.getElementById('cv-header').style.borderColor = c; }

        function updatePreview() {
            const data = userData[currentLang];
            document.getElementById('out-name').innerText = data.name || dictionary[currentLang].name;
            
            let addr = "";
            if (currentLang !== 'hu') {
                if(data.zip || data.city) addr += `<span>${data.zip} ${data.city}</span>`;
                if(data.street || data.house) addr += `, <span>${data.street} ${data.house}</span>`;
            } else {
                if(data.city) addr += `<span>${data.city}</span>`;
                if(data.street || data.house) addr += `, <span>${data.street} ${data.house}</span>`;
                if(data.zip) addr += `, <span>${data.zip}</span>`;
            }
            
            let contact = addr;
            if(data.phone) contact += ` | <span>${data.phone}</span>`;
            if(data.email) contactHtml = contact += ` | <span>${data.email}</span>`;
            
            document.getElementById('out-contact').innerHTML = contact;
            document.getElementById('out-summary').innerText = data.summary;
            document.getElementById('main-content').innerHTML = `<h3>${dictionary[currentLang].exp}</h3><div style="white-space:pre-wrap;">${data.exp}</div>`;
        }

        window.onload = () => { changeLang('hu'); updateTheme(); };
    </script>
</body>
</html>
