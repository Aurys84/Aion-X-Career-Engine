<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Aion-X Dashboard v14.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="style-10">
    <div class="editor-side">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
            <div style="width:45px; height:45px; background:var(--main-color); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">A&N</div>
            <h2 id="lbl-title" style="color:var(--main-color); margin:0;">AION-X PANEL</h2>
        </div>

        <div id="ats-box" style="background:#1a3a5a; padding:12px; border-radius:8px; margin-bottom:15px; border-left:4px solid #f1c40f; font-size:11px; color:white;">
            <b id="lbl-atsTitle">🚀 GIGA ATS TIPPEK:</b><br>
            <div id="lbl-ats1">• Használj szoftverneveket (SAP)!</div>
            <div id="lbl-ats2">• Számok (pl. +20% hatékonyság)!</div>
            <div id="lbl-ats3">• Profi fotó: Világos háttér!</div>
        </div>
        
        <div class="lang-grid">
            <button class="btn-lang active" onclick="setMode('hu', this)">HU</button>
            <button class="btn-lang" onclick="setMode('en', this)">EN</button>
            <button class="btn-lang" onclick="setMode('de', this)">DE</button>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label class="smart-label" id="lbl-style">STÍLUS</label>
                <select id="style-select" onchange="updateStyle()">
                    <option value="style-10">10. Aion-X Speciál</option>
                    <option value="style-1">1. Modern Oszlopos</option>
                    <option value="style-2">2. Klasszikus</option>
                    <option value="style-3">3. Centrált</option>
                    <option value="style-4">4. Minimalista</option>
                    <option value="style-5">5. Technikai</option>
                    <option value="style-6">6. Kreatív Oldalsáv</option>
                    <option value="style-7">7. Menedzseri</option>
                    <option value="style-8">8. Akadémiai</option>
                    <option value="style-9">9. Junior Bold</option>
                </select>
            </div>
            <div style="flex:1"><label class="smart-label" id="lbl-color">SZÍN</label>
                <select id="theme-color" onchange="updateTheme()">
                    <option value="#007bb5">Aion Kék</option>
                    <option value="#e67e22">Norbi Narancs</option>
                    <option value="#27ae60">Smaragd</option>
                    <option value="#c0392b">Vörös</option>
                    <option value="#8e44ad">Lila</option>
                    <option value="#1a1a1a">Fekete</option>
                    <option value="#2c3e50">Pala</option>
                    <option value="#d35400">Tégla</option>
                    <option value="#16a085">Türkiz</option>
                    <option value="#f1c40f">Arany</option>
                </select>
            </div>
        </div>

        <label class="smart-label" id="lbl-photo">FOTÓ</label>
        <input type="file" id="in-photo" accept="image/*" onchange="loadPhoto(event)">

        <label class="smart-label" id="lbl-name">NÉV</label>
        <input type="text" id="in-name" placeholder="Név" oninput="updatePreview()">

        <label class="smart-label" id="lbl-city">IRSZ / VÁROS / UTCA / HÁZ</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="in-zip" placeholder="IRSZ" oninput="updatePreview()" style="width:30%">
            <input type="text" id="in-city" placeholder="Város" oninput="updatePreview()" style="width:70%">
        </div>
        <div style="display: flex; gap: 5px; margin-top:5px;">
            <input type="text" id="in-street" placeholder="Utca" oninput="updatePreview()" style="width:70%">
            <input type="text" id="in-house" placeholder="Ház" oninput="updatePreview()" style="width:30%">
        </div>

        <label class="smart-label" id="lbl-summary">PROFIL</label>
        <textarea id="in-summary" rows="2" oninput="updatePreview()"></textarea>

        <label class="smart-label" id="lbl-license">JOGOSÍTVÁNY</label>
        <input type="text" id="in-license" oninput="updatePreview()">

        <label class="smart-label" id="lbl-edu">TANULMÁNYOK</label>
        <div id="edu-container"></div>
        <button onclick="addEntry('edu')" class="add-btn" id="lbl-addE">+ ÚJ ISKOLA</button>

        <label class="smart-label" id="lbl-work">MUNKAHELYEK</label>
        <div id="work-container"></div>
        <button onclick="addEntry('work')" class="add-btn" id="lbl-addW">+ ÚJ MUNKA</button>

        <button onclick="window.print()" style="background:var(--main-color); color:white; padding:15px; width:100%; border:none; margin-top:20px; font-weight:bold; cursor:pointer; border-radius:6px;">PDF GENERÁLÁSA</button>
    </div>

    <div class="preview-side">
        <div class="cv-paper" id="cv-paper">
            <div class="cv-header" style="display:flex; gap:25px;">
                <div id="out-photo-box" style="display:none; width:130px; height:160px; border:1px solid #ccc; overflow:hidden;">
                    <img id="out-photo" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="header-text">
                    <h1 id="out-name">NAME</h1>
                    <div id="out-contact"></div>
                </div>
            </div>
            <div id="main-content"></div>
        </div>
    </div>
    <script src="dictionary.js"></script>
    <script src="engine.js"></script>
</body>
</html>
